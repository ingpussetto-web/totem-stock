<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensajería Comercial — Totem Nube</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0f;--panel:#0d1117;--panel2:#111620;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#e8eaf0;--text2:#7a8099;--text3:#3a4055;
  --green:#00e5a0;--green-dim:rgba(0,229,160,0.1);--green-border:rgba(0,229,160,0.25);
  --amber:#ffb340;--amber-dim:rgba(255,179,64,0.1);--amber-border:rgba(255,179,64,0.25);
  --red:#ff4d6a;--red-dim:rgba(255,77,106,0.1);--red-border:rgba(255,77,106,0.25);
  --radius:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:100}
.top-bar-left{display:flex;align-items:center;gap:16px}
.back-btn{color:var(--text2);text-decoration:none;font-size:12px;display:flex;align-items:center;gap:4px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius)}
.back-btn:hover{border-color:var(--border2);color:var(--text)}
.top-title{font-size:15px;font-weight:600}
.top-sub{font-size:11px;color:var(--text2);margin-top:1px}

.tabs{display:flex;gap:8px;padding:16px 24px 0}
.tab{font-size:12px;padding:8px 16px;border-radius:var(--radius) var(--radius) 0 0;border:1px solid var(--border2);border-bottom:none;background:var(--panel2);color:var(--text2);cursor:pointer}
.tab.activo{background:var(--panel);color:var(--green);border-color:var(--green-border)}
.tab .n{background:var(--border2);border-radius:8px;font-size:10px;padding:1px 6px;margin-left:6px}

.wrap{max-width:840px;margin:0 auto;padding:20px 24px 60px}
.contadores{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.cont-chip{font-size:11px;padding:6px 12px;border-radius:var(--radius);background:var(--panel2);border:1px solid var(--border);color:var(--text2)}
.cont-chip b{color:var(--text)}

.cliente-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.cliente-nombre{font-size:14px;font-weight:600}
.cliente-meta{font-size:11px;color:var(--text3);margin-top:2px;margin-bottom:10px}
.item-row{background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
.item-row:last-child{margin-bottom:0}
.item-info{flex:1;min-width:0}
.item-producto{font-size:12px;font-weight:500}
.item-msg{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-actions{display:flex;gap:6px;flex-shrink:0}
.btn-wa{font-size:11px;padding:5px 10px;border-radius:var(--radius);border:1px solid #25d366;background:rgba(37,211,102,0.1);color:#25d366;cursor:pointer;font-weight:600;white-space:nowrap}
.btn-ok{font-size:11px;padding:5px 10px;border-radius:var(--radius);border:1px solid var(--green-border);background:var(--green-dim);color:var(--green);cursor:pointer;font-weight:600;white-space:nowrap}
.btn-crear{font-size:11px;padding:5px 10px;border-radius:var(--radius);border:1px solid var(--amber-border);background:var(--amber-dim);color:var(--amber);cursor:pointer;font-weight:600;white-space:nowrap}
.empty{font-size:12px;color:var(--text3);text-align:center;padding:40px 20px;border:1px dashed var(--border);border-radius:10px}
.loader{font-size:12px;color:var(--text3);padding:20px;text-align:center}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 18px;font-size:13px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

/* Modal centrado */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal-box{background:var(--panel);border:1px solid var(--border2);border-radius:14px;width:460px;max-width:92vw;max-height:88vh;overflow-y:auto;display:flex;flex-direction:column}
.det-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.det-cliente{font-size:15px;font-weight:600}
.close-btn{background:none;border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);cursor:pointer;padding:5px 10px;font-size:18px;line-height:1}
.close-btn:hover{border-color:var(--border2);color:var(--text)}
.det-body{padding:20px;display:flex;flex-direction:column;gap:8px}
.det-section{display:flex;flex-direction:column;gap:8px}
.det-input,textarea{background:var(--panel2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:8px 10px;font-size:12px;font-family:inherit;width:100%}
.flabel{font-size:11px;color:var(--text2);margin-bottom:-2px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;padding:0 20px 20px}
.modal-hint{font-size:12px;color:var(--text2);line-height:1.4;background:var(--panel2);border-radius:var(--radius);padding:8px 10px;border:1px solid var(--border)}
.btn{padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-family:inherit}
.btn:hover{border-color:var(--green);color:var(--green)}
.btn.solid{background:var(--green);color:#000;border-color:var(--green);font-weight:600}

/* Respuestas Rápidas */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.filter-chip{font-size:11px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s}
.filter-chip:hover{border-color:var(--border2);color:var(--text)}
.filter-chip.activo{background:var(--green-dim);border-color:var(--green-border);color:var(--green);font-weight:600}
.filter-chip.t-comercial.activo{background:rgba(255,179,64,.12);border-color:var(--amber-border);color:var(--amber)}
.filter-chip.t-tecnica.activo{background:rgba(110,168,255,.12);border-color:rgba(110,168,255,.3);color:#6ea8ff}
.filter-chip.t-logistica.activo{background:var(--green-dim);border-color:var(--green-border);color:var(--green)}
.filter-chip.t-post_venta.activo{background:rgba(255,77,106,.1);border-color:var(--red-border);color:var(--red)}
.filter-chip.t-servicios_personalizados.activo{background:rgba(180,130,255,.1);border-color:rgba(180,130,255,.3);color:#b482ff}
.filter-chip.t-general.activo{background:var(--panel2);border-color:var(--border2);color:var(--text)}

.rr-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.rr-header{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
.rr-titulo{font-size:13px;font-weight:600;flex:1}
.rr-badges{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}
.rr-badge{font-size:10px;padding:2px 8px;border-radius:8px;background:var(--panel2);border:1px solid var(--border);color:var(--text2)}
.rr-badge.comercial{background:rgba(255,179,64,.1);border-color:var(--amber-border);color:var(--amber)}
.rr-badge.tecnica{background:rgba(110,168,255,.1);border-color:rgba(110,168,255,.3);color:#6ea8ff}
.rr-badge.logistica{background:var(--green-dim);border-color:var(--green-border);color:var(--green)}
.rr-badge.post_venta{background:rgba(255,77,106,.08);border-color:var(--red-border);color:var(--red)}
.rr-mensaje{font-size:11px;color:var(--text2);white-space:pre-wrap;line-height:1.5;margin-bottom:10px;max-height:80px;overflow:hidden;position:relative}
.rr-mensaje::after{content:'';position:absolute;bottom:0;left:0;right:0;height:20px;background:linear-gradient(transparent,var(--panel))}
.rr-actions{display:flex;gap:6px;align-items:center}

/* Layout dos columnas */
.rr-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.rr-lista{display:flex;flex-direction:column;gap:6px;max-height:calc(100vh - 300px);overflow-y:auto;padding-right:4px}
.rr-list-item{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:11px 13px;cursor:pointer;transition:border-color .15s,background .15s}
.rr-list-item:hover{border-color:var(--border2)}
.rr-list-item.seleccionado{border-color:var(--green-border);background:rgba(0,229,160,0.05)}
.rr-list-main{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px}
.rr-list-texto{flex:1;min-width:0}
.rr-list-titulo{font-size:12px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rr-list-objetivo{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rr-list-badges{display:flex;gap:4px;flex-wrap:wrap}
.orden-badge{font-size:10px;min-width:20px;text-align:center;padding:2px 5px;border-radius:6px;background:var(--panel2);border:1px solid var(--border);color:var(--text3);flex-shrink:0}
.alt-badge{font-size:10px;padding:2px 7px;border-radius:8px;background:rgba(255,179,64,.1);border:1px solid var(--amber-border);color:var(--amber);flex-shrink:0;white-space:nowrap}

.rr-preview{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:18px;position:sticky;top:80px;max-height:calc(100vh - 260px);overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.rr-preview-empty{font-size:12px;color:var(--text3);text-align:center;padding:50px 20px;line-height:1.6}
.rr-preview-head{border-bottom:1px solid var(--border);padding-bottom:10px}
.rr-preview-titulo{font-size:14px;font-weight:600;margin-bottom:4px}
.rr-preview-objetivo{font-size:11px;color:var(--green);font-weight:500}
.rr-preview-partes{display:flex;flex-direction:column;gap:8px}
.rr-burbuja{background:#0f1f14;border:1px solid rgba(0,229,160,.15);border-radius:12px 12px 3px 12px;padding:10px 14px}
.rr-burbuja-num{font-size:10px;color:var(--green);font-weight:600;margin-bottom:4px;letter-spacing:.03em}
.rr-burbuja-texto{font-size:12px;color:var(--text);white-space:pre-wrap;line-height:1.55}
.rr-preview-actions{display:flex;gap:7px;flex-wrap:wrap;padding-top:4px;border-top:1px solid var(--border)}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-left">
    <a href="index.html" class="back-btn">← Sistema</a>
    <div>
      <div class="top-title">Mensajería Comercial</div>
      <div class="top-sub">Encuestas · Newsletter · Reventa</div>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab activo" id="tab-encuesta" onclick="setTab('encuesta')">Encuestas <span class="n" id="n-encuesta">0</span></button>
  <button class="tab" id="tab-newsletter" onclick="setTab('newsletter')">Newsletter <span class="n" id="n-newsletter">0</span></button>
  <button class="tab" id="tab-reventa" onclick="setTab('reventa')">Reventa <span class="n" id="n-reventa">0</span></button>
  <button class="tab" id="tab-plantillas" onclick="setTab('plantillas')">Plantillas</button>
  <button class="tab" id="tab-respuestas" onclick="setTab('respuestas')">Respuestas Rápidas</button>
</div>

<div class="wrap">
  <div class="contadores" id="contadores"></div>
  <div id="contenido"><div class="loader">Cargando...</div></div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="modal2-overlay" onclick="if(event.target===this) cerrarModal2()">
  <div class="modal-box">
    <div class="det-head">
      <div class="det-cliente" id="modal2-title"></div>
      <button class="close-btn" onclick="cerrarModal2()">✕</button>
    </div>
    <div class="det-body" id="modal2-body"></div>
    <div class="modal-actions">
      <button class="btn" onclick="cerrarModal2()">Cancelar</button>
      <button class="btn solid" onclick="_modal2Callback && _modal2Callback()">Guardar</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://nkkwukcgxyhudprlhjjw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ra3d1a2NneHlodWRwcmxoamp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMjAzNTQsImV4cCI6MjA5MzU5NjM1NH0.NGDzPGnChtqYbnjcIZhso1CUozqG_JQ7TyElKSesy5s';

let _proyectos = [];
let _templates = [];
let _respuestas = [];
let _interacciones_lead = [];
let _tabActivo = 'encuesta';
let _modal2Callback = null;
let _filtroProducto = 'todos';
let _filtroTipo = 'todos';
let _filtroExtra = 'todos';
let _seleccionadaId = null;

const TIPOS_CONSULTA = [
  { key:'todos',                  label:'Todos' },
  { key:'comercial',              label:'Comercial' },
  { key:'tecnica',                label:'Técnica' },
  { key:'logistica',              label:'Logística' },
  { key:'post_venta',             label:'Post Venta' },
  { key:'servicios_personalizados', label:'Servicios personalizados' },
  { key:'general',                label:'General' },
];
function labelTipo(k){ return TIPOS_CONSULTA.find(t=>t.key===k)?.label || k; }

function abrirModal2(title, bodyHtml, callback){
  document.getElementById('modal2-title').textContent = title;
  document.getElementById('modal2-body').innerHTML = bodyHtml;
  _modal2Callback = callback;
  document.getElementById('modal2-overlay').classList.add('open');
}
function cerrarModal2(){
  document.getElementById('modal2-overlay').classList.remove('open');
  _modal2Callback = null;
}

async function api(path, method='GET', body=null){
  const opts = { method, headers: {
    'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY,
    'Content-Type': 'application/json', 'Prefer': 'return=representation'
  }};
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(SUPABASE_URL+'/rest/v1/'+path, opts);
  if(!r.ok){ const e=await r.text(); throw new Error(e); }
  return r.status===204 ? null : r.json();
}
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function toast(msg, dur=2800){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}
function diasDesde(iso){ if(!iso) return 0; return Math.floor((new Date()-new Date(iso))/86400000); }
function normNumero(tel){ let n=String(tel||'').replace(/\D/g,''); if(n.length<=10) n='549'+n; return n; }

async function init(){
  try{
    [_proyectos, _templates, _respuestas, _interacciones_lead] = await Promise.all([
      api('proyectos_comercial?select=*'),
      api('wa_templates_producto?select=*'),
      api('wa_respuestas_rapidas?select=*&order=producto.asc,tipo_consulta.asc,titulo.asc'),
      api('wa_interacciones_lead?select=*&order=created_at.desc'),
    ]);
    await cargarContadores();
    render();
  } catch(e){
    document.getElementById('contenido').innerHTML = '<div class="empty" style="color:var(--red)">Error: '+esc(e.message)+'</div>';
  }
}

async function cargarContadores(){
  try{
    const mesActual = new Date().toISOString().slice(0,7)+'-01';
    const rows = await api(`wa_contadores?mes=eq.${mesActual}&select=*`);
    const box = document.getElementById('contadores');
    if(!rows || !rows.length){ box.innerHTML = '<span class="cont-chip">Sin envíos este mes todavía</span>'; return; }
    box.innerHTML = rows.map(r=>`<span class="cont-chip"><b>${r.cantidad_enviada}</b> ${esc(r.categoria)}</span>`).join('');
  } catch(e){}
}

// ─── Candidatos por categoría (calculados en vivo, sin cron) ──
function candidatosEncuesta(){
  return _proyectos.filter(p =>
    p.estado === 'proyecto_finalizado' &&
    !p.encuesta_generada &&
    diasDesde(p.fecha_estado_actual) >= 30
  );
}
function candidatosNewsletter(){
  return _proyectos.filter(p =>
    p.estado === 'espera_indefinida' &&
    (!p.ultimo_newsletter_enviado || diasDesde(p.ultimo_newsletter_enviado) >= 15)
  );
}
function candidatosReventa(){
  return _proyectos.filter(p =>
    p.estado === 'proyecto_finalizado' &&
    !p.reventa_enviada
  );
}

function setTab(tab){
  _tabActivo = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('activo'));
  document.getElementById('tab-'+tab).classList.add('activo');
  render();
}

function render(){
  document.getElementById('n-encuesta').textContent = candidatosEncuesta().length;
  document.getElementById('n-newsletter').textContent = agruparPorCliente(candidatosNewsletter()).length;
  document.getElementById('n-reventa').textContent = agruparPorCliente(candidatosReventa()).length;

  const cont = document.getElementById('contenido');
  if(_tabActivo === 'encuesta'){
    cont.innerHTML = renderEncuestas(candidatosEncuesta());
  } else if(_tabActivo === 'newsletter'){
    cont.innerHTML = renderAgrupado(agruparPorCliente(candidatosNewsletter()), 'newsletter');
  } else if(_tabActivo === 'reventa'){
    cont.innerHTML = renderAgrupado(agruparPorCliente(candidatosReventa()), 'reventa');
  } else if(_tabActivo === 'plantillas'){
    cont.innerHTML = renderPlantillas();
  } else if(_tabActivo === 'respuestas'){
    cont.innerHTML = renderRespuestasRapidas();
  }
}

function agruparPorCliente(lista){
  const map = new Map();
  lista.forEach(p=>{
    const key = p.cliente_nombre + '|' + p.telefono;
    if(!map.has(key)) map.set(key, { cliente_nombre:p.cliente_nombre, telefono:p.telefono, empresa:p.empresa, items:[] });
    map.get(key).items.push(p);
  });
  return [...map.values()];
}

function renderEncuestas(lista){
  if(!lista.length) return '<div class="empty">No hay encuestas pendientes por ahora.</div>';
  return lista.map(p=>{
    const t = _templates.find(x=>x.producto===p.producto && x.categoria==='encuesta');
    const msg = t ? t.mensaje_base.replace(/{nombre}/g, p.cliente_nombre) + (t.link_extra?'\n'+t.link_extra:'') : null;
    return `<div class="cliente-card">
      <div class="cliente-nombre">${esc(p.cliente_nombre)}</div>
      <div class="cliente-meta">${esc(p.producto)} · finalizado hace ${diasDesde(p.fecha_estado_actual)} días</div>
      <div class="item-row">
        <div class="item-info">
          <div class="item-msg">${msg ? esc(msg) : 'Sin plantilla de encuesta para este producto'}</div>
        </div>
        <div class="item-actions">
          ${msg
            ? `<button class="btn-wa" onclick="enviar(${p.id},'encuesta')">📱 Enviar</button>`
            : `<button class="btn-crear" onclick="crearYEnviar(${p.id},'encuesta')">Crear plantilla</button>`}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderAgrupado(grupos, categoria){
  if(!grupos.length) return `<div class="empty">No hay clientes pendientes de ${categoria} por ahora.</div>`;
  return grupos.map(g=>{
    const rows = g.items.map(p=>{
      const t = _templates.find(x=>x.producto===p.producto && x.categoria===categoria);
      return `<div class="item-row">
        <div class="item-info">
          <div class="item-producto">${esc(p.producto)}</div>
          <div class="item-msg">${t ? esc(t.mensaje_base) : 'Sin plantilla — creála para habilitar el envío'}</div>
        </div>
        <div class="item-actions">
          ${t
            ? `<button class="btn-wa" onclick="enviar(${p.id},'${categoria}')">📱 Enviar</button>`
            : `<button class="btn-crear" onclick="crearYEnviar(${p.id},'${categoria}')">Crear plantilla</button>`}
        </div>
      </div>`;
    }).join('');
    return `<div class="cliente-card">
      <div class="cliente-nombre">${esc(g.cliente_nombre)}</div>
      <div class="cliente-meta">${esc(g.empresa||'')}</div>
      ${rows}
    </div>`;
  }).join('');
}

function crearYEnviar(proyectoId, categoria){
  const p = _proyectos.find(x=>x.id===proyectoId);
  const body = `
    <div class="det-section">
      <div class="modal-hint">No hay mensaje de <b>${esc(categoria)}</b> para <b>${esc(p.producto)}</b> todavía. Lo cargás una vez y queda disponible para siempre.</div>
      <div class="flabel">Mensaje (usá {nombre} para el nombre del cliente)</div>
      <textarea id="mt-mensaje" style="min-height:90px" placeholder="Hola {nombre}, te contamos..."></textarea>
      <div class="flabel">Link opcional (YouTube, etc.)</div>

async function enviar(proyectoId, categoria){
  const p = _proyectos.find(x=>x.id===proyectoId);
  if(!p) return;
  const t = _templates.find(x=>x.producto===p.producto && x.categoria===categoria);
  if(!t){ toast('No hay plantilla — creála primero'); return; }
  const msg = t.mensaje_base.replace(/{nombre}/g, p.cliente_nombre||'') + (t.link_extra?'\n'+t.link_extra:'');
  window.open(`https://wa.me/${normNumero(p.telefono)}?text=${encodeURIComponent(msg)}`, '_blank');

  const patch = {};
  if(categoria==='encuesta') patch.encuesta_generada = true;
  if(categoria==='newsletter') patch.ultimo_newsletter_enviado = new Date().toISOString();
  if(categoria==='reventa') patch.reventa_enviada = true;

  try{
    await api(`proyectos_comercial?id=eq.${proyectoId}`, 'PATCH', patch);
    Object.assign(p, patch);
    await api('rpc/fn_incrementar_contador', 'POST', { p_categoria: categoria }).catch(()=>{});
    toast('Enviado ✓ registrado en contadores');
    await cargarContadores();
    render();
  } catch(e){ toast('Error al registrar: '+e.message); }
}

// ─── RESPUESTAS RÁPIDAS ───────────────────────────────────────────────────
function renderRespuestasRapidas(){
  const productos = ['todos', ...[...new Set(_respuestas.map(r=>r.producto))].sort()];

  let filtradas = _respuestas;
  if(_filtroProducto !== 'todos') filtradas = filtradas.filter(r=>r.producto===_filtroProducto || r.producto==='General');
  if(_filtroTipo !== 'todos') filtradas = filtradas.filter(r=>r.tipo_consulta===_filtroTipo);
  if(_filtroExtra !== 'todos') filtradas = filtradas.filter(r=>r.filtro_extra===_filtroExtra || r.filtro_extra==='todos' || !r.filtro_extra);

  // Orden cronológico de conversación
  const sorted = [...filtradas].sort((a,b)=>
    ((a.orden_conversacion||99)-(b.orden_conversacion||99)) ||
    (a.titulo||'').localeCompare(b.titulo||'')
  );

  // Auto-seleccionar el primero si la selección actual no está en los resultados
  if(!sorted.find(r=>r.id===_seleccionadaId)){
    _seleccionadaId = sorted[0]?.id || null;
  }

  // Detectar alternativas: agrupar por objetivo
  const porObjetivo = {};
  sorted.forEach(r=>{
    const k = [(r.objetivo||'').trim(), r.producto||'', r.tipo_consulta||'', r.filtro_extra||''].join('|') || ('__'+r.id);
    if(!porObjetivo[k]) porObjetivo[k] = [];
    porObjetivo[k].push(r.id);
  });

  const productoSel = `<select class="det-input" style="width:auto;min-width:180px;" onchange="_filtroProducto=this.value;render()">
    ${productos.map(p=>`<option value="${esc(p)}" ${_filtroProducto===p?'selected':''}>${p==='todos'?'Todos los productos':esc(p)}</option>`).join('')}
  </select>`;

  const tipoChips = TIPOS_CONSULTA.map(t=>
    `<button class="filter-chip t-${t.key} ${_filtroTipo===t.key?'activo':''}" onclick="_filtroTipo='${t.key}';render()">${t.label}</button>`
  ).join('');

  const extraChips = [
    {key:'todos',label:'Todos'},{key:'hardware',label:'Hardware'},{key:'software',label:'Software'},
  ].map(e=>
    `<button class="filter-chip ${_filtroExtra===e.key?'activo':''}" onclick="_filtroExtra='${e.key}';render()">${e.label}</button>`
  ).join('');

  const lista = sorted.length ? sorted.map(r=>{
    const objKey = [(r.objetivo||'').trim(), r.producto||'', r.tipo_consulta||'', r.filtro_extra||''].join('|') || ('__'+r.id);
    const alts = porObjetivo[objKey];
    const altIdx = alts.length > 1 ? alts.indexOf(r.id)+1 : 0;
    const altBadge = altIdx > 0 ? `<span class="alt-badge">Alt ${altIdx}</span>` : '';
    const sel = _seleccionadaId === r.id;
    return `<div class="rr-list-item ${sel?'seleccionado':''}" onclick="seleccionarRespuesta(${r.id})" data-id="${r.id}">
      <div class="rr-list-main">
        ${r.orden_conversacion && r.orden_conversacion<99 ? `<span class="orden-badge">${r.orden_conversacion}</span>` : ''}
        <div class="rr-list-texto">
          <div class="rr-list-titulo">${esc(r.titulo)}</div>
          ${r.objetivo?`<div class="rr-list-objetivo">${esc(r.objetivo)}</div>`:''}
        </div>
        ${altBadge}
      </div>
      <div class="rr-list-badges">
        <span class="rr-badge ${r.tipo_consulta}">${labelTipo(r.tipo_consulta)}</span>
        <span class="rr-badge">${esc(r.producto)}</span>
      </div>
    </div>`;
  }).join('')
  : `<div class="empty">Sin respuestas para estos filtros.</div>`;

  const sel = _respuestas.find(r=>r.id===_seleccionadaId);
  const preview = sel ? renderPreviewHtml(sel)
    : `<div class="rr-preview-empty">← Seleccioná un mensaje<br>para ver la vista previa</div>`;

  return `
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
      ${productoSel}
      <button class="btn-crear" onclick="nuevaRespuesta()">+ Nueva respuesta</button>
    </div>
    <div class="filter-row">${tipoChips}</div>
    <div class="filter-row" style="margin-bottom:14px;">${extraChips}</div>
    <div class="rr-layout">
      <div class="rr-lista">${lista}</div>
      <div class="rr-preview" id="rr-preview">${preview}</div>
    </div>`;
}

function seleccionarRespuesta(id){
  _seleccionadaId = id;
  document.querySelectorAll('.rr-list-item').forEach(el=>{
    el.classList.toggle('seleccionado', el.dataset.id===String(id));
  });
  const preview = document.getElementById('rr-preview');
  if(preview){
    const r = _respuestas.find(x=>x.id===id);
    preview.innerHTML = r ? renderPreviewHtml(r) : '';
  }
}

function renderPreviewHtml(r){
  const partes = Array.isArray(r.partes) ? r.partes : (r.mensaje ? [r.mensaje] : []);
  const burbujas = partes.map((m,i)=>`
    <div class="rr-burbuja">
      ${partes.length>1 ? `<div class="rr-burbuja-num">Parte ${i+1}</div>` : ''}
      <div class="rr-burbuja-texto">${esc(m)}</div>
    </div>`).join('');
  return `
    <div class="rr-preview-head">
      <div class="rr-preview-titulo">${esc(r.titulo)}</div>
      ${r.objetivo?`<div class="rr-preview-objetivo">↳ ${esc(r.objetivo)}</div>`:''}
    </div>
    <div class="rr-preview-partes">${burbujas}</div>
    <div class="rr-preview-actions">
      <button class="btn-ok" onclick="copiarRespuesta(${r.id})">📋 Copiar y registrar</button>
      <button class="btn-crear" onclick="editarRespuesta(${r.id})">✎ Editar</button>
      <button class="btn" style="color:var(--red);border-color:var(--red-border);" onclick="eliminarRespuesta(${r.id})">✕ Eliminar</button>
    </div>`;
}

async function copiarRespuesta(id){
  const r = _respuestas.find(x=>x.id===id);
  if(!r) return;
  try{ await navigator.clipboard.writeText(r.mensaje); }catch(e){}

  const leadsActivos = _proyectos
    .filter(p=>!['proyecto_finalizado','rechazado'].includes(p.estado))
    .sort((a,b)=>a.cliente_nombre.localeCompare(b.cliente_nombre));

  const optsLead = leadsActivos.map(p=>`<option value="${p.id}">${esc(p.cliente_nombre)} — ${esc(p.producto||'')}</option>`).join('');

  const body = `
    <div class="det-section">
      <div class="modal-hint">✓ Mensaje copiado al portapapeles.<br>¿A qué lead le mandaste este mensaje?</div>
      <div class="flabel">Lead (opcional)</div>
      <select class="det-input" id="rr-lead-sel">
        <option value="">— Sin vincular —</option>
        ${optsLead}
      </select>
    </div>`;

  abrirModal2('Registrar envío', body, async ()=>{
    const proyId = document.getElementById('rr-lead-sel').value;
    cerrarModal2();
    if(!proyId) return;
    try{
      const nueva = await api('wa_interacciones_lead', 'POST', [{
        proyecto_id: proyId,
        respuesta_id: id,
        tipo_consulta: r.tipo_consulta,
        titulo: r.titulo,
      }]);
      if(nueva?.[0]) _interacciones_lead.unshift(nueva[0]);
      toast('Interacción registrada ✓');
    } catch(e){ toast('Error: '+e.message); }
  });
}

  const optsProducto = [...new Set([...(_respuestas.map(r=>r.producto)), defaults.producto||''].filter(Boolean))];
  const optsTipo = TIPOS_CONSULTA.filter(t=>t.key!=='todos');
  return `
    <div class="det-section">
      <div class="flabel">Producto</div>
      <input class="det-input" id="rr-producto" value="${esc(defaults.producto||'')}" list="rr-prod-list" placeholder="ej: Turnero 32&quot;">
      <datalist id="rr-prod-list">${optsProducto.map(p=>`<option value="${esc(p)}">`).join('')}</datalist>
      <div class="flabel">Tipo de consulta</div>
      <select class="det-input" id="rr-tipo">
        ${optsTipo.map(t=>`<option value="${t.key}" ${defaults.tipo_consulta===t.key?'selected':''}>${t.label}</option>`).join('')}
      </select>
      <div class="flabel">Filtro extra</div>
      <select class="det-input" id="rr-extra">
        <option value="todos" ${(defaults.filtro_extra||'todos')==='todos'?'selected':''}>Todos</option>
        <option value="hardware" ${defaults.filtro_extra==='hardware'?'selected':''}>Hardware</option>
        <option value="software" ${defaults.filtro_extra==='software'?'selected':''}>Software</option>
      </select>
      <div class="flabel">Objetivo <span style="color:var(--text3)">(qué logra este mensaje — ej: "Presentar el producto")</span></div>
      <input class="det-input" id="rr-objetivo" value="${esc(defaults.objetivo||'')}" list="rr-obj-list" placeholder="ej: Aclarar alcance técnico">
      <datalist id="rr-obj-list">${[...new Set(_respuestas.map(r=>r.objetivo).filter(Boolean))].map(o=>`<option value="${esc(o)}">`).join('')}</datalist>
      <div class="flabel">Orden en la conversación <span style="color:var(--text3)">(número — menor = más temprano)</span></div>
      <input class="det-input" id="rr-orden" type="number" min="1" max="99" value="${defaults.orden_conversacion||99}" style="width:100px;">

      <textarea id="rr-mensaje" style="min-height:110px;resize:vertical;">${esc(defaults.mensaje||'')}</textarea>
    </div>`;
}

function nuevaRespuesta(){
  abrirModal2('Nueva respuesta rápida', _formRespuesta({ tipo_consulta:'comercial', filtro_extra:'todos' }), async ()=>{
    const producto          = document.getElementById('rr-producto').value.trim();
    const tipo_consulta     = document.getElementById('rr-tipo').value;
    const filtro_extra      = document.getElementById('rr-extra').value;
    const objetivo          = document.getElementById('rr-objetivo').value.trim() || null;
    const orden_conversacion= parseInt(document.getElementById('rr-orden').value) || 99;
    const titulo            = document.getElementById('rr-titulo').value.trim();
    const mensaje           = document.getElementById('rr-mensaje').value.trim();
    if(!producto||!titulo||!mensaje){ toast('Producto, título y mensaje son obligatorios'); return; }
    try{
      const nueva = await api('wa_respuestas_rapidas', 'POST', [{ producto, tipo_consulta, filtro_extra, objetivo, orden_conversacion, titulo, mensaje }]);
      _respuestas.push(nueva[0]);
      cerrarModal2(); toast('Respuesta creada ✓'); render();
    } catch(e){ toast('Error: '+e.message); }
  });
}

function editarRespuesta(id){
  const r = _respuestas.find(x=>x.id===id);
  if(!r) return;
  abrirModal2('Editar respuesta', _formRespuesta(r), async ()=>{
    const producto          = document.getElementById('rr-producto').value.trim();
    const tipo_consulta     = document.getElementById('rr-tipo').value;
    const filtro_extra      = document.getElementById('rr-extra').value;
    const objetivo          = document.getElementById('rr-objetivo').value.trim() || null;
    const orden_conversacion= parseInt(document.getElementById('rr-orden').value) || 99;
    const titulo            = document.getElementById('rr-titulo').value.trim();
    const mensaje           = document.getElementById('rr-mensaje').value.trim();
    if(!producto||!titulo||!mensaje){ toast('Producto, título y mensaje son obligatorios'); return; }
    try{
      await api(`wa_respuestas_rapidas?id=eq.${id}`, 'PATCH', { producto, tipo_consulta, filtro_extra, objetivo, orden_conversacion, titulo, mensaje });
      Object.assign(r, { producto, tipo_consulta, filtro_extra, objetivo, orden_conversacion, titulo, mensaje });
      cerrarModal2(); toast('Respuesta actualizada ✓');
      if(_seleccionadaId===id){ const p=document.getElementById('rr-preview'); if(p) p.innerHTML=renderPreviewHtml(r); }
      render();
    } catch(e){ toast('Error: '+e.message); }
  });
}

async function eliminarRespuesta(id){
  if(!confirm('¿Eliminás esta respuesta rápida?')) return;
  try{
    await api(`wa_respuestas_rapidas?id=eq.${id}`, 'DELETE');
    _respuestas = _respuestas.filter(r=>r.id!==id);
    toast('Eliminada'); render();
  } catch(e){ toast('Error: '+e.message); }
}

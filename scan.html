<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Totem Nube — Escaneo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0f11;--surface:#17171a;--surface2:#1e1e22;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f0;--text2:#888;--text3:#666;
  --green:#00c896;--green-dim:rgba(0,200,150,0.12);--green-border:rgba(0,200,150,0.3);
  --amber:#f5a623;--amber-dim:rgba(245,166,35,0.12);--amber-border:rgba(245,166,35,0.3);
  --red:#ff5e5e;--red-dim:rgba(255,94,94,0.1);--red-border:rgba(255,94,94,0.3);
  --blue:#4d9fff;--blue-dim:rgba(77,159,255,0.1);--blue-border:rgba(77,159,255,0.3);
  --radius:10px;--radius-lg:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:10px;}
.header-logo{font-size:13px;font-weight:600;}
.header-sub{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}

.container{padding:20px 16px;max-width:480px;margin:0 auto;}

/* Estado badge grande */
.estado-card{border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;text-align:center;}
.estado-card.stock{background:var(--green-dim);border:1px solid var(--green-border);}
.estado-card.reservado{background:var(--amber-dim);border:1px solid var(--amber-border);}
.estado-card.producido{background:var(--surface2);border:1px solid var(--border2);}
.estado-card.baja{background:var(--red-dim);border:1px solid var(--red-border);}
.estado-card.notfound{background:var(--red-dim);border:1px solid var(--red-border);}

.estado-icon{font-size:36px;margin-bottom:8px;}
.estado-label{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;font-family:'DM Mono',monospace;margin-bottom:4px;}
.estado-card.stock .estado-label{color:var(--green);}
.estado-card.reservado .estado-label{color:var(--amber);}
.estado-card.producido .estado-label{color:var(--text3);}
.estado-card.baja .estado-label{color:var(--red);}
.estado-card.notfound .estado-label{color:var(--red);}

/* Info del insumo */
.insumo-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;}
.insumo-nombre{font-size:17px;font-weight:600;margin-bottom:4px;}
.insumo-variante{font-size:13px;color:var(--amber);font-family:'DM Mono',monospace;margin-bottom:8px;}
.insumo-uid{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;padding:6px 10px;background:var(--surface2);border-radius:6px;word-break:break-all;}

/* Info de asignación */
.asig-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;}
.asig-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;font-family:'DM Mono',monospace;margin-bottom:12px;}
.asig-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border);}
.asig-row:last-child{border-bottom:none;}
.asig-key{font-size:11px;color:var(--text3);}
.asig-val{font-size:12px;color:var(--text);text-align:right;font-family:'DM Mono',monospace;max-width:60%;}

/* OPs disponibles */
.ops-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;}
.ops-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;font-family:'DM Mono',monospace;margin-bottom:12px;}
.op-item{padding:12px;background:var(--surface2);border-radius:var(--radius);margin-bottom:8px;border:1px solid var(--border);}
.op-item:last-child{margin-bottom:0;}
.op-item-numero{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:2px;}
.op-item-cliente{font-size:14px;font-weight:500;margin-bottom:2px;}
.op-item-producto{font-size:12px;color:var(--text2);}
.op-item-color{font-size:11px;color:var(--amber);font-family:'DM Mono',monospace;margin-top:3px;}
.btn-asignar{width:100%;margin-top:10px;background:var(--green);border:none;border-radius:var(--radius);color:#000;font-size:14px;font-weight:600;padding:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s;}
.btn-asignar:hover{background:#00b888;}
.btn-asignar:disabled{opacity:0.5;cursor:not-allowed;}

.btn-secondary{width:100%;background:transparent;border:1px solid var(--border2);border-radius:var(--radius);color:var(--text2);font-size:13px;padding:10px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;}

/* Loading */
.loading-wrap{text-align:center;padding:60px 20px;}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;}

/* Nombre input */
.nombre-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;}
.nombre-label{font-size:11px;color:var(--text2);margin-bottom:8px;display:block;}
.nombre-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;}
.nombre-input:focus{outline:none;border-color:var(--green);}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--green-border);color:var(--green);font-size:12px;font-family:'DM Mono',monospace;padding:10px 18px;border-radius:var(--radius);z-index:9999;transition:opacity 0.3s;opacity:0;pointer-events:none;white-space:nowrap;}

/* Confirmación */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:flex-end;justify-content:center;padding:0;}
.confirm-overlay.open{display:flex;}
.confirm-sheet{background:var(--surface);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:24px 20px;width:100%;max-width:480px;}
.confirm-title{font-size:16px;font-weight:600;margin-bottom:6px;}
.confirm-body{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5;}
.confirm-btn-yes{width:100%;background:var(--green);border:none;border-radius:var(--radius);color:#000;font-size:15px;font-weight:600;padding:14px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-bottom:8px;}
.confirm-btn-no{width:100%;background:transparent;border:1px solid var(--border2);border-radius:var(--radius);color:var(--text2);font-size:14px;padding:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">Totem Nube</div>
    <div class="header-sub">CONTROL DE INSUMOS</div>
  </div>
</div>

<div class="container" id="container">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-txt">Cargando información...</div>
  </div>
</div>

<!-- Modal selección de slot -->
<div class="confirm-overlay" id="slot-overlay">
  <div class="confirm-sheet">
    <div class="confirm-title">¿A qué equipo asignás esta Mini PC?</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:16px;" id="slot-subtitle"></div>
    <div id="slot-lista" style="display:flex;flex-direction:column;gap:8px;max-height:55vh;overflow-y:auto;margin-bottom:16px;"></div>
    <button class="confirm-btn-no" onclick="cerrarSlotOverlay()">Cancelar</button>
  </div>
</div>

<!-- Sheet asignación de caja por unidad -->
<div class="confirm-overlay" id="asig-caja-overlay">
  <div class="confirm-sheet" style="max-height:82vh;display:flex;flex-direction:column;">
    <div class="confirm-title" id="asig-caja-title"></div>
    <div style="font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:16px;" id="asig-caja-sub"></div>
    <div id="asig-caja-lista" style="display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;margin-bottom:16px;"></div>
    <button class="confirm-btn-no" onclick="cerrarAsigCajaSheet()">Listo / Cerrar</button>
  </div>
</div>

<!-- Desasignación -->
<div class="confirm-overlay" id="desasig-overlay">
  <div class="confirm-sheet">
    <div class="confirm-title" style="color:var(--red);">✕ Desasignar insumo</div>
    <div class="confirm-body" id="desasig-body"></div>
    <label style="font-size:11px;color:var(--text3);display:block;margin-bottom:4px;">Tu nombre</label>
    <input id="desasig-nombre" type="text" placeholder="Ej: Juan García"
      style="width:100%;padding:10px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;margin-bottom:12px;">
    <label style="font-size:11px;color:var(--text3);display:block;margin-bottom:4px;">Contraseña</label>
    <input id="desasig-pass" type="password" placeholder="••••••••"
      style="width:100%;padding:10px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;margin-bottom:16px;">
    <button class="confirm-btn-yes" id="desasig-yes" style="background:var(--red);color:#fff;margin-bottom:8px;">Desasignar</button>
    <button class="confirm-btn-no" onclick="cerrarDesasigOverlay()">Cancelar</button>
  </div>
</div>

<!-- Confirmación asignación -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-sheet">
    <div class="confirm-title" id="confirm-title">Confirmar asignación</div>
    <div class="confirm-body" id="confirm-body"></div>
    <button class="confirm-btn-yes" id="confirm-yes">Confirmar asignación</button>
    <button class="confirm-btn-no" onclick="closeConfirm()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = localStorage.getItem('supa_url') || '';
const SUPA_KEY = localStorage.getItem('supa_key') || '';

let unidadActual = null;
let opSeleccionada = null;

function esc(str){ return (str||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function api(path, method='GET', body=null){
  const opts = {
    method,
    headers:{
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': method==='POST'?'return=representation':method==='PATCH'?'return=representation':''
    }
  };
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPA_URL+'/rest/v1/'+path, opts);
  if(!res.ok) throw new Error(await res.text());
  if(res.status===204) return null;
  return res.json();
}

// Setup automático desde QR de configuración
(function setupFromURL(){
  const params = new URLSearchParams(window.location.search);
  if(params.get('setup') === '1'){
    const su = params.get('su');
    const sk = params.get('sk');
    if(su && sk){
      localStorage.setItem('supa_url', decodeURIComponent(su));
      localStorage.setItem('supa_key', decodeURIComponent(sk));
      const uid = params.get('uid') || '';
      if(!uid){
        window.history.replaceState({}, '', window.location.pathname);
        document.getElementById('container').innerHTML =
          '<div style="text-align:center;padding:60px 20px;">' +
          '<div style="font-size:56px;margin-bottom:16px;">&#x2705;</div>' +
          '<div style="font-size:18px;font-weight:700;margin-bottom:8px;color:var(--green);">Celular configurado</div>' +
          '<div style="font-size:13px;color:var(--text3);margin-bottom:24px;line-height:1.6;">La conexion a Supabase quedo guardada en este dispositivo.</div>' +
          '<div style="font-size:11px;color:var(--text3);margin-top:16px;">Ya podes escanear etiquetas QR de insumos.</div>' +
          '</div>';
        window._setupDone = true;
        return;
      }
      const newUrl = window.location.pathname + '?uid=' + uid;
      window.history.replaceState({}, '', newUrl);
    }
  }
})();

async function init(){
  if(window._setupDone) return;

  if(!SUPA_URL || !SUPA_KEY){
    renderError('Sin configuración', 'Escaneá el QR de configuración desde el panel principal antes de usar el escaneo.');
    return;
  }

  const params = new URLSearchParams(window.location.search);
  const uid = params.get('uid');

  if(!uid){
    renderError('Sin UID', 'Este QR no contiene un código de insumo válido.');
    return;
  }

  try{
    // Buscar la unidad física
    const unidades = await api(`unidades?uid=eq.${encodeURIComponent(uid)}&select=*,skus(id,codigo,nombre,tracking,categorias(nombre)),variantes(id,valor)`);

    if(!unidades || !unidades.length){
      // Fallback: buscar por código de SKU (etiqueta de caja)
      const skus = await api(`skus?codigo=eq.${encodeURIComponent(uid)}&select=id,codigo,nombre,tracking,categorias(nombre)`).catch(()=>[]);
      if(skus && skus.length && skus[0].tracking === 'cantidad'){
        await renderCaja(skus[0]);
        return;
      }
      renderNotFound(uid);
      return;
    }

    unidadActual = unidades[0];

    if(unidadActual.estado === 'stock'){
      await renderEnStock();
    } else if(unidadActual.estado === 'reservado'){
      await renderReservado();
    } else if(unidadActual.estado === 'producido'){
      renderProducido();
    } else {
      renderBaja();
    }
  }catch(e){
    renderError('Error de conexión', e.message);
  }
}

async function renderEnStock(){
  const u = unidadActual;
  const variante = u.variantes?.valor || '';

  // Buscar OPs en_produccion que necesiten este SKU
  const bomItems = await api(
    `op_bom_items?sku_id=eq.${u.sku_id}&estado=eq.pendiente&incluido=eq.true&select=*,ordenes_produccion(id,op_numero,cliente,producto_nombre,color_gabinete,estado)`
  );

  // Filtrar OPs en producción — si es gabinete, filtrar también por color
  const esGabinete = variante && ['Negro','Blanco','Gris Claro','Gris Plomo'].includes(variante);
  const itemsValidos = (bomItems||[]).filter(b=>{
    if(!['en_produccion','bom_confirmada'].includes(b.ordenes_produccion?.estado)) return false;
    if(esGabinete){
      const colorOP = b.ordenes_produccion?.color_gabinete || '';
      return colorOP === variante || colorOP === 'A definir' || colorOP === '';
    }
    // Si la unidad tiene variante_id, solo mostrar items BOM que matcheen esa variante (o sin variante especificada)
    if(u.variante_id != null) return b.variante_id == null || b.variante_id === u.variante_id;
    return true;
  });

  // Agrupar por OP — guardar TODOS los items pendientes por OP
  const opsPorId = {};
  itemsValidos.forEach(b=>{
    const opId = b.ordenes_produccion?.id;
    if(!opId) return;
    if(!opsPorId[opId]) opsPorId[opId] = { op: b.ordenes_produccion, items: [] };
    opsPorId[opId].items.push(b);
  });
  const opsAgrupadas = Object.values(opsPorId);

  // Guardar mapa de items por OP para modal de slots
  window._slotItemsPorOp = opsPorId;

  const opsHTML = opsAgrupadas.length
    ? opsAgrupadas.map(({op, items})=>{
        const pendientesEnOP = items.length;
        // Mostrar selector siempre para players (notas con 🖥), sin importar cuántos queden pendientes
        const esPlayer = items.some(i => (i.notas||'').startsWith('🖥'));
        const usaSelector = esPlayer || pendientesEnOP > 1;
        return `<div class="op-item">
          <div class="op-item-numero">${esc(op.op_numero)}</div>
          <div class="op-item-cliente">${esc(op.cliente)}</div>
          <div class="op-item-producto">${esc(op.producto_nombre)}</div>
          ${op.color_gabinete?`<div class="op-item-color">● Color: ${esc(op.color_gabinete)}</div>`:''}
          ${pendientesEnOP>1?`<div style="font-size:10px;color:var(--amber);font-family:monospace;margin-top:4px;">Quedan ${pendientesEnOP} unidades por asignar en esta OP</div>`:''}
          <button class="btn-asignar"
            data-op-id="${op.id}"
            data-op-numero="${op.op_numero}"
            data-cliente="${(op.cliente||'').replace(/"/g,'&quot;')}"
            data-usa-selector="${usaSelector}"
            data-bom-id="${!usaSelector ? items[0].id : ''}"
            data-notas="${(!usaSelector ? (items[0].notas||'') : '').replace(/"/g,'&quot;')}"
            onclick="handleAsignarBtn(this)">
            Asignar a esta OP
          </button>
        </div>`;
      }).join('')
    : `<div style="text-align:center;padding:16px;color:var(--text3);font-size:12px;font-family:'DM Mono',monospace;">
        No hay órdenes activas que requieran este insumo
      </div>`;

  document.getElementById('container').innerHTML = `
    <div class="estado-card stock">
      <div class="estado-icon">✓</div>
      <div class="estado-label">En stock — disponible</div>
    </div>

    <div class="insumo-card">
      <div class="insumo-nombre">${esc(u.skus?.nombre)||'—'}</div>
      ${variante?`<div class="insumo-variante">● ${variante}</div>`:''}
      <div class="insumo-uid">${esc(u.uid)}</div>
    </div>

    <div class="nombre-section">
      <label class="nombre-label">Tu nombre (para el registro)</label>
      <input class="nombre-input" type="text" id="inp-nombre" placeholder="Ej: Juan García" autocomplete="name">
    </div>

    <div class="ops-card">
      <div class="ops-title">Órdenes de producción activas</div>
      ${opsHTML}
    </div>
  `;
}

async function renderReservado(){
  const u = unidadActual;
  const variante = u.variantes?.valor || '';

  // Buscar a qué OP está asignado
  const bomItems = await api(
    `op_bom_items?uid_asignado=eq.${encodeURIComponent(u.uid)}&select=*,ordenes_produccion(id,op_numero,cliente,producto_nombre,color_gabinete)`
  );

  const bom = bomItems?.[0];
  const op = bom?.ordenes_produccion;
  const fechaAsig = u.updated_at ? new Date(u.updated_at).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
  let asignadoPor = '—';
  if(bom && bom.notas){
    const matchAP = bom.notas.match(/Asignado por: ([^—]+)/);
    if(matchAP) asignadoPor = matchAP[1].split(' —')[0].trim();
  }

  // Número de equipo (fuera del try para usarlo en el layout)
  const equipoNum = bom?.equipo_num || null;

  // Conteo de este SKU en la OP: total y asignados
  let progresoBadge = '';
  if(op?.id && u.sku_id){
    try {
      const todosLosItems = await api(
        `op_bom_items?op_id=eq.${op.id}&sku_id=eq.${u.sku_id}&incluido=eq.true&select=id,uid_asignado,equipo_num`
      );
      const total = todosLosItems?.length || 0;
      const asignados = (todosLosItems||[]).filter(i => i.uid_asignado && i.uid_asignado !== 'CANTIDAD-DESCONTADA').length;
      const faltan = total - asignados;
      const completo = faltan === 0;
      const colorProg = completo ? 'var(--green)' : 'var(--amber)';
      const iconProg = completo ? '✅' : '⚠️';
      const txtProg = completo
        ? `Todos los ${total} escaneados`
        : `${asignados} de ${total} escaneados — faltan ${faltan}`;
      progresoBadge = `
      <div style="margin-top:10px;padding:10px 12px;background:${completo?'var(--green-dim)':'var(--amber-dim)'};border:1px solid ${completo?'var(--green-border)':'var(--amber-border)'};border-radius:8px;">
        <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:4px;">PROGRESO EN ESTA OP</div>
        <div style="font-size:13px;font-weight:600;color:${colorProg};">${iconProg} ${txtProg}</div>
      </div>`;
    } catch(e){ console.warn('No se pudo calcular progreso:', e); }
  }

  // Card de equipo — prominente, es lo primero que busca producción
  const equipoCard = equipoNum ? `
    <div style="text-align:center;padding:18px 16px;margin-bottom:12px;background:var(--amber-dim);border:2px solid var(--amber-border);border-radius:var(--radius-lg);">
      <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.12em;font-family:'DM Mono',monospace;margin-bottom:6px;">Este insumo va en</div>
      <div style="font-size:48px;font-weight:700;color:var(--amber);line-height:1;">EQUIPO ${equipoNum}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:6px;">${esc(op?.op_numero||'')} · ${esc(op?.cliente||'')}</div>
    </div>` : '';

  document.getElementById('container').innerHTML = `
    <div class="estado-card reservado">
      <div class="estado-icon">🔒</div>
      <div class="estado-label">Reservado — asignado a producción</div>
    </div>

    ${equipoCard}

    <div class="insumo-card">
      <div class="insumo-nombre">${esc(u.skus?.nombre)||'—'}</div>
      ${variante?`<div class="insumo-variante">● ${variante}</div>`:''}
      <div class="insumo-uid">${esc(u.uid)}</div>
    </div>

    ${op ? `
    <div class="asig-card">
      <div class="asig-title">Asignación actual</div>
      <div class="asig-row"><div class="asig-key">N° Orden</div><div class="asig-val">${esc(op.op_numero)}</div></div>

let _desasigBomId = null;
let _desasigOpNumero = '';

function confirmarDesasignar(bomId, opNumero){
  _desasigBomId = bomId;
  _desasigOpNumero = opNumero;

  document.getElementById('desasig-body').innerHTML =
    `Vas a quitar <strong>${esc(unidadActual.skus?.nombre||'')}</strong> de <strong>${esc(opNumero)}</strong>.<br>` +
    `<span style="font-size:11px;color:var(--red);">Esta acción queda registrada en auditoría.</span><br><br>`;

  document.getElementById('desasig-nombre').value = '';
  document.getElementById('desasig-pass').value = '';

  document.getElementById('desasig-yes').onclick = () => {
    const nombre = document.getElementById('desasig-nombre').value.trim();
    const pass   = document.getElementById('desasig-pass').value;
    if(!nombre){ toast('Ingresá tu nombre'); return; }
    if(pass !== '480'){ toast('Contraseña incorrecta'); return; }
    cerrarDesasigOverlay();
    ejecutarDesasignacion(nombre);
  };

  const ov = document.getElementById('desasig-overlay');
  ov.classList.add('open');
  ov.style.display = 'flex';
}

function cerrarDesasigOverlay(){
  const ov = document.getElementById('desasig-overlay');
  ov.classList.remove('open');
  ov.style.display = '';
}

async function ejecutarDesasignacion(nombre){
  try{
    // Limpiar BOM item → pendiente (guardar nota de quién desasignó)
    await api(`op_bom_items?id=eq.${_desasigBomId}`, 'PATCH', {
      estado: 'pendiente',
      uid_asignado: null,
      notas: `Desasignado por: ${nombre} — ${new Date().toLocaleString('es-AR')}`
    });
    // Volver unidad a stock
    await api(`unidades?id=eq.${unidadActual.id}`, 'PATCH', {
      estado: 'stock',
      updated_at: new Date().toISOString()
    });
    // Registrar en auditoría (no bloquea si la tabla no existe aún)
    await api('auditoria', 'POST', {
      accion: 'desasignacion',
      usuario: nombre,
      uid: unidadActual.uid,
      sku_nombre: unidadActual.skus?.nombre || '',
      op_numero: _desasigOpNumero,
      detalle: {
        bom_id: _desasigBomId,
        variante: unidadActual.variantes?.valor || null,
        sku_id: unidadActual.sku_id
      }
    }).catch(e => console.warn('Audit log:', e.message));

    unidadActual.estado = 'stock';
    unidadActual.updated_at = new Date().toISOString();
    toast('✓ Desasignado — vuelto a stock');
    await renderEnStock();
  }catch(e){
    toast('Error: '+e.message);
  }
}

let cajaSkuActual = null;
let cajaStockRow = null;
let cajaReservado = 0;
let cajaStockRowsAll = [];      // todas las filas de stock (por variante)
let cajaAsignadosActivos = [];  // op_bom_items asignados en OPs activas

async function renderCaja(sku){
  cajaSkuActual = sku;

  // Traer stock por variante
  cajaStockRowsAll = await api(`stock?sku_id=eq.${sku.id}&select=id,cantidad,variante_id`).catch(()=>[]);
  cajaStockRow = cajaStockRowsAll?.[0]; // backward compat

  // Calcular reservado real por variante (solo OPs activas)
  const asignadosRealesRaw = await api(`op_bom_items?sku_id=eq.${sku.id}&uid_asignado=not.is.null&estado=eq.asignado&select=id,variante_id,ordenes_produccion(estado)`).catch(()=>[]);
  const _estadosActivosCaja = ['iniciada','bom_pendiente','bom_confirmada','en_produccion'];
  cajaAsignadosActivos = (asignadosRealesRaw||[]).filter(a => _estadosActivosCaja.includes(a.ordenes_produccion?.estado));
  cajaReservado = cajaAsignadosActivos.length;

  // Helper: disponible para una variante específica
  function dispDeVariante(varianteId){
    const sRow = varianteId != null
      ? (cajaStockRowsAll||[]).find(r => r.variante_id === varianteId)
      : (cajaStockRowsAll||[]).find(r => r.variante_id == null) || cajaStockRowsAll?.[0];
    const cantidad = sRow?.cantidad || 0;
    const reservado = cajaAsignadosActivos.filter(a =>
      varianteId != null ? a.variante_id === varianteId : a.variante_id == null
    ).length;
    return { disponible: cantidad - reservado, cantidad, stockId: sRow?.id };
  }

  // Totales globales para header
  const totalGlobal = (cajaStockRowsAll||[]).reduce((acc,r)=>acc+(r.cantidad||0),0);
  const disponibleGlobal = totalGlobal - cajaReservado;

  // Traer todos los items (pendiente + asignado) para mostrar progreso agrupado
  const allBomItems = await api(
    `op_bom_items?sku_id=eq.${sku.id}&incluido=eq.true&estado=in.(pendiente,asignado)&select=id,estado,variante_id,variantes(valor),ordenes_produccion(id,op_numero,cliente,producto_nombre,estado)`
  ).catch(()=>[]);
  const _estadosActivos = ['iniciada','bom_pendiente','bom_confirmada','en_produccion'];
  const itemsActivos = (allBomItems||[]).filter(i =>
    i.ordenes_produccion && _estadosActivos.includes(i.ordenes_produccion.estado)
  );

  // Agrupar por OP (+ variante)
  const opGroupsMap = {};
  itemsActivos.forEach(item => {
    const key = `${item.ordenes_produccion.id}_${item.variante_id||'null'}`;
    if(!opGroupsMap[key]){
      opGroupsMap[key] = {
        op: item.ordenes_produccion,
        variante: item.variantes?.valor || null,
        variante_id: item.variante_id,
        todos: [], pendientes: []
      };
    }
    opGroupsMap[key].todos.push(item);
    if(item.estado === 'pendiente') opGroupsMap[key].pendientes.push(item);
  });
  const opGroups = Object.values(opGroupsMap);

  // Breakdown de stock por color (si hay variantes)
  const variantesEnStock = (cajaStockRowsAll||[]).filter(r => r.variante_id != null);
  let stockBreakdownHTML = '';
  if(variantesEnStock.length > 0){
    const varIds = variantesEnStock.map(r => r.variante_id);
    const variantesData = await api(`variantes?id=in.(${varIds.join(',')})&select=id,valor`).catch(()=>[]);
    const filasColores = variantesEnStock.map(r => {
      const v = (variantesData||[]).find(vd => vd.id === r.variante_id);
      const d = dispDeVariante(r.variante_id);
      const c = d.disponible <= 0 ? 'var(--red)' : 'var(--green)';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;">
        <span style="font-size:12px;color:var(--amber);font-weight:600;">● ${v?.valor||'?'}</span>
        <span style="font-size:13px;font-weight:700;color:${c};">${d.disponible} <span style="font-size:10px;color:var(--text3);font-weight:400;">/ ${d.cantidad} total</span></span>
      </div>`;
    }).join('');
    stockBreakdownHTML = `
      <div style="background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:16px;">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-family:monospace;margin-bottom:6px;">Stock por color</div>
        ${filasColores}
      </div>`;
  }

  const colorDisp = disponibleGlobal <= 0 ? 'var(--red)' : 'var(--green)';

  const opsHTML = opGroups.length
    ? opGroups.map(({op, variante, variante_id, todos, pendientes}) => {
        const total = todos.length;
        const asignados = total - pendientes.length;
        const completo = pendientes.length === 0;
        const pct = total > 0 ? Math.round((asignados / total) * 100) : 0;
        const d = dispDeVariante(variante_id);
        const hayStock = d.disponible > 0;
        const firstPending = pendientes[0];
        const colorBar = completo ? 'var(--green)' : 'var(--amber)';
        return `
        <div style="border:1px solid ${completo?'var(--green-border)':'var(--border2)'};border-radius:var(--radius);padding:14px;margin-bottom:10px;background:${completo?'var(--green-dim)':'var(--surface2)'};">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:15px;font-weight:700;color:var(--text);">${esc(op.cliente)}</div>
              <div style="font-size:11px;color:var(--text3);font-family:monospace;margin-top:1px;">${esc(op.op_numero)}</div>
              <div style="font-size:11px;color:var(--text2);margin-top:2px;">${esc(op.producto_nombre||'')}</div>
              ${variante?`<div style="font-size:11px;color:var(--amber);margin-top:2px;">● ${esc(variante)}</div>`:''}
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:12px;">
              <div style="font-size:26px;font-weight:700;color:${colorBar};line-height:1;">${asignados}<span style="font-size:14px;color:var(--text3);">/${total}</span></div>
              <div style="font-size:9px;color:var(--text3);font-family:monospace;">ASIGNADOS</div>
            </div>
          </div>
          <div style="height:5px;background:rgba(255,255,255,0.07);border-radius:3px;margin-bottom:10px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;background:${colorBar};border-radius:3px;"></div>
          </div>
          ${completo
            ? `<div style="text-align:center;font-size:12px;color:var(--green);font-weight:600;padding:4px 0;">✓ Todos los ${total} asignados</div>`
            : hayStock
              ? `<button
                  data-pending-ids="${pendientes.map(p=>p.id).join(',')}"
                  data-varianteid="${variante_id||''}"
                  data-opnum="${esc(op.op_numero)}"
                  data-cliente="${esc(op.cliente)}"
                  data-total="${total}"
                  data-asignados="${asignados}"
                  onclick="abrirAsigCajaSheet(this)"
                  style="width:100%;padding:11px;background:var(--green);border:none;border-radius:6px;color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;">
                  → Asignar unidades — faltan ${pendientes.length}
                </button>`
              : `<div style="text-align:center;font-size:12px;color:var(--red);padding:4px 0;">Sin stock disponible</div>`
          }
        </div>`;
      }).join('')
    : '<div style="color:var(--text3);font-size:12px;padding:12px 0;text-align:center;">Sin OPs activas que necesiten este insumo</div>';

  document.getElementById('container').innerHTML = `
    <div style="padding:16px 0;">
      <div style="text-align:center;margin-bottom:16px;">
        <div style="font-size:28px;margin-bottom:6px;">📦</div>
        <div style="font-size:11px;color:var(--text3);font-family:monospace;text-transform:uppercase;letter-spacing:0.1em;">${esc(sku.categorias?.nombre||'')}</div>
        <div style="font-size:18px;font-weight:700;margin:4px 0;">${esc(sku.nombre)}</div>
        <div style="font-size:10px;color:var(--text3);font-family:monospace;">${esc(sku.codigo)}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
        <div style="background:var(--surface2);border-radius:8px;padding:12px;text-align:center;">
          <div style="font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;">Disponible</div>
          <div style="font-size:32px;font-weight:700;color:${colorDisp};" id="caja-disp-total">${disponibleGlobal}</div>
        </div>
        <div style="background:var(--surface2);border-radius:8px;padding:12px;text-align:center;">
          <div style="font-size:10px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;">Total caja</div>
          <div style="font-size:32px;font-weight:700;">${totalGlobal}</div>
        </div>
      </div>
      ${stockBreakdownHTML}
      <div id="caja-ops-wrap">
        <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-family:monospace;margin-bottom:8px;">OPs que necesitan este insumo</div>
        ${opsHTML}
      </div>
    </div>`;
}

// ─── SHEET DE ASIGNACIÓN POR UNIDAD (CAJA) ───────────────────
let _sheetPendienteIds = [];
let _sheetVarId = null;
let _sheetAsignados = 0;
let _sheetTotal = 0;

function abrirAsigCajaSheet(btn){
  _sheetPendienteIds = btn.dataset.pendingIds.split(',').map(Number);
  _sheetVarId = btn.dataset.varianteid ? parseInt(btn.dataset.varianteid) : null;
  _sheetAsignados = parseInt(btn.dataset.asignados);
  _sheetTotal = parseInt(btn.dataset.total);

  document.getElementById('asig-caja-title').textContent = btn.dataset.cliente;
  document.getElementById('asig-caja-sub').textContent = btn.dataset.opnum;
  renderSheetLista();

  const ov = document.getElementById('asig-caja-overlay');
  ov.classList.add('open');
  ov.style.display = 'flex';
}

function renderSheetLista(){
  const sub = document.getElementById('asig-caja-sub');
  const lista = document.getElementById('asig-caja-lista');
  if(!lista) return;

  if(sub) sub.innerHTML = `<span style="font-family:'DM Mono',monospace;">${lista.dataset.opnum||''}</span>` +
    ` — <strong style="color:var(--amber);">${_sheetAsignados} de ${_sheetTotal}</strong> asignados`;

  lista.innerHTML = _sheetPendienteIds.length
    ? _sheetPendienteIds.map((bomId, i) => {
        const num = _sheetAsignados + i + 1;
        return `<div id="sheet-row-${bomId}" style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);">
          <div>
            <div style="font-size:14px;font-weight:600;">Unidad ${num} de ${_sheetTotal}</div>
            <div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;">${cajaSkuActual?.nombre||''}</div>
          </div>
          <button onclick="asignarUnaDesdeSheet(${bomId})"
            style="background:var(--green);border:none;border-radius:6px;padding:9px 18px;color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0;">
            ✓ Asignar
          </button>
        </div>`;
      }).join('')
    : `<div style="text-align:center;color:var(--green);padding:24px;font-size:15px;font-weight:700;">✓ Todos asignados</div>`;
}

async function asignarUnaDesdeSheet(bomId){
  const varianteId = _sheetVarId;
  const stockRowVar = varianteId != null
    ? (cajaStockRowsAll||[]).find(r => r.variante_id === varianteId)
    : (cajaStockRowsAll||[]).find(r => r.variante_id == null) || cajaStockRowsAll?.[0];
  if(!stockRowVar){ toast('Error: sin stock'); return; }

  const reservadoVar = (cajaAsignadosActivos||[]).filter(a =>
    varianteId != null ? a.variante_id === varianteId : a.variante_id == null
  ).length;
  if((stockRowVar.cantidad||0) - reservadoVar <= 0){ toast('Sin stock disponible'); return; }

  const row = document.getElementById(`sheet-row-${bomId}`);
  const btnEl = row?.querySelector('button');
  if(btnEl){ btnEl.disabled = true; btnEl.textContent = '...'; }

  try{
    await api('op_bom_items?id=eq.'+bomId, 'PATCH', {estado:'asignado', uid_asignado: cajaSkuActual.codigo+'-CAJA'});
    await api('stock?id=eq.'+stockRowVar.id, 'PATCH', {cantidad_reservada: reservadoVar + 1});

    // Actualizar estado local
    cajaAsignadosActivos.push({variante_id: varianteId, ordenes_produccion:{estado:'en_produccion'}});
    _sheetPendienteIds = _sheetPendienteIds.filter(id => id !== bomId);
    _sheetAsignados += 1;

    // Marcar fila como asignada
    if(row) row.innerHTML = `<div style="color:var(--green);font-size:13px;font-weight:600;padding:4px 0;">✓ Unidad ${_sheetAsignados} — asignada</div>`;

    // Actualizar subtítulo
    const sub = document.getElementById('asig-caja-sub');
    if(sub) sub.innerHTML = `<strong style="color:var(--amber);">${_sheetAsignados} de ${_sheetTotal}</strong> asignados`;

    // Si se asignaron todas, cerrar y refrescar
    if(_sheetPendienteIds.length === 0){
      setTimeout(async ()=>{ await cerrarAsigCajaSheet(); }, 900);
    }
  }catch(e){
    toast('Error: '+e.message);
    if(btnEl){ btnEl.disabled = false; btnEl.textContent = '✓ Asignar'; }
  }
}

async function cerrarAsigCajaSheet(){
  const ov = document.getElementById('asig-caja-overlay');
  ov.classList.remove('open');
  ov.style.display = '';
  await renderCaja(cajaSkuActual);
}

let pendingBomId = null;
let pendingOpId = null;
let pendingBomNotas = '';
let pendingOpNumero = '';
let pendingCliente = '';

function handleAsignarBtn(btn){
  const opId = parseInt(btn.dataset.opId);
  const opNumero = btn.dataset.opNumero;
  const cliente = btn.dataset.cliente;
  const usaSelector = btn.dataset.usaSelector === 'true';
  if(usaSelector){
    mostrarSelectorSlot(opId, opNumero, cliente);
  } else {
    const bomId = parseInt(btn.dataset.bomId);
    const notas = btn.dataset.notas;
    prepararAsignacion(bomId, opId, opNumero, cliente, notas);
  }
}

function mostrarSelectorSlot(opId, opNumero, cliente){
  const entrada = window._slotItemsPorOp?.[opId];
  if(!entrada) return;
  const items = entrada.items;

  document.getElementById('slot-subtitle').textContent = opNumero + ' · ' + cliente;

  const lista = document.getElementById('slot-lista');
  lista.innerHTML = items.map(item => {
    // Generar etiqueta legible del slot
    let label = '';
    const notas = item.notas || '';
    const eq = item.equipo_num;
    if(notas.startsWith('🖥')){
      // Es player — extraer equipo de las notas si equipo_num es null
      const matchEq = notas.match(/Equipo\s*(\d+)/i);
      const eqLabel = eq ? eq : (matchEq ? matchEq[1] : null);
      label = eqLabel ? '🖥 Player · Equipo ' + eqLabel : '🖥 Player';
    } else if(eq){
      label = '📦 Equipo ' + eq;
    } else {
      label = '📦 Equipo (sin número)';
    }
    return `<button 
      data-bom-id="${item.id}" data-op-id="${opId}" data-op-numero="${opNumero}" data-cliente="${cliente.replace(/"/g,'&quot;')}" data-notas="${(notas||'').replace(/"/g,'&quot;')}"
      onclick="seleccionarSlotBtn(this)"
      style="width:100%;padding:14px 16px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-size:14px;font-weight:500;text-align:left;cursor:pointer;font-family:'DM Sans',sans-serif;">
      ${label}
    </button>`;
  }).join('');

  const overlay = document.getElementById('slot-overlay');
  overlay.style.display = 'flex';
}

function seleccionarSlotBtn(btn){
  const bomId = parseInt(btn.dataset.bomId);
  const opId = parseInt(btn.dataset.opId);
  const opNumero = btn.dataset.opNumero;
  const cliente = btn.dataset.cliente;
  const notas = btn.dataset.notas;
  cerrarSlotOverlay();
  prepararAsignacion(bomId, opId, opNumero, cliente, notas);
}

function seleccionarSlot(bomId, opId, opNumero, cliente, notas){
  cerrarSlotOverlay();
  prepararAsignacion(bomId, opId, opNumero, cliente, notas);
}

function cerrarSlotOverlay(){
  const overlay = document.getElementById('slot-overlay');
  if(overlay) overlay.style.display = 'none';
}

function prepararAsignacion(bomId, opId, opNumero, cliente, notasOriginales){
  pendingBomId = bomId;
  pendingOpId = opId;
  pendingBomNotas = notasOriginales || '';
  pendingOpNumero = opNumero;
  pendingCliente = cliente;

  // Obtener nombre actual (puede completarse en el confirm)
  const nombreActual = document.getElementById('inp-nombre')?.value.trim() || '';

  document.getElementById('confirm-title').textContent = 'Confirmar asignación';
  document.getElementById('confirm-body').innerHTML =
    `<strong>${unidadActual.skus?.nombre}</strong> ${unidadActual.variantes?.valor?'('+unidadActual.variantes.valor+')':''}<br><br>` +
    `→ <strong>${opNumero}</strong> · ${cliente}<br><br>` +
    `<label style="font-size:12px;color:var(--text3);">Tu nombre:</label><br>` +
    `<input id="confirm-nombre" type="text" value="${nombreActual}" placeholder="Ej: Juan García" ` +
    `style="width:100%;margin-top:6px;padding:10px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;">`;

  document.getElementById('confirm-yes').onclick = () => {
    const nombre = document.getElementById('confirm-nombre')?.value.trim();
    if(!nombre){ toast('Ingresá tu nombre'); return; }
    // Sincronizar con el campo principal
    const inp = document.getElementById('inp-nombre');
    if(inp) inp.value = nombre;
    ejecutarAsignacion(nombre);
  };
  
  const overlay = document.getElementById('confirm-overlay');
  if(overlay){
    overlay.classList.add('open');
    overlay.style.display = 'flex';
  }
}

function closeConfirm(){
  const ov = document.getElementById('confirm-overlay');
  ov.classList.remove('open');
  ov.style.display = '';  // limpiar inline style que sobreescribía el CSS
}

async function ejecutarAsignacion(nombre){
  closeConfirm();
  const btn = document.querySelector('.btn-asignar');
  if(btn) btn.disabled = true;

  try{
    // Actualizar op_bom_items
    // Preservar prefijo 🖥 PLAYER si el item era un player
    const prefixPlayer = pendingBomNotas.startsWith('🖥') ? '🖥 PLAYER — ' : '';
    await api(`op_bom_items?id=eq.${pendingBomId}`, 'PATCH', {
      estado: 'asignado',
      uid_asignado: unidadActual.uid,
      notas: `${prefixPlayer}Asignado por: ${nombre} — ${new Date().toLocaleString('es-AR')}`
    });

    // Actualizar unidad → reservado
    await api(`unidades?id=eq.${unidadActual.id}`, 'PATCH', {
      estado: 'reservado',
      updated_at: new Date().toISOString()
    });

    // Refrescar la vista
    unidadActual.estado = 'reservado';
    unidadActual.updated_at = new Date().toISOString();
    renderExito(unidadActual.skus?.nombre||'', unidadActual.variantes?.valor||'', pendingOpNumero, pendingCliente, nombre);

  }catch(e){
    toast('Error: '+e.message);
    if(btn) btn.disabled = false;
  }
}

// ─── PANTALLA ÉXITO ───────────────────────────────────────────
function renderExito(nombreInsumo, variante, opNumero, cliente, nombre){
  document.getElementById('container').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:20px;">
      <div style="width:88px;height:88px;background:var(--green-dim);border:2px solid var(--green-border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:20px;">
        <span style="font-size:42px;line-height:1;">✓</span>
      </div>
      <div style="font-size:24px;font-weight:700;color:var(--green);margin-bottom:6px;">¡Asignación OK!</div>
      <div style="font-size:13px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:28px;">Por: ${esc(nombre)}</div>

      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;width:100%;text-align:left;margin-bottom:28px;">
        <div style="font-size:15px;font-weight:600;margin-bottom:6px;">
          ${esc(nombreInsumo)}${variante?` <span style="color:var(--amber);font-size:13px;">● ${esc(variante)}</span>`:''}
        </div>
        <div style="font-size:13px;color:var(--green);font-family:'DM Mono',monospace;font-weight:600;margin-bottom:2px;">→ ${esc(opNumero)}</div>
        <div style="font-size:12px;color:var(--text2);">${esc(cliente)}</div>
      </div>

      <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:16px;">
        Mostrando detalles en <span id="exito-cd" style="color:var(--green);">3</span>s...
      </div>
      <button onclick="clearInterval(window._exitoTimer);renderReservado();"
        style="background:transparent;border:1px solid var(--border2);border-radius:var(--radius);color:var(--text2);font-size:13px;padding:10px 24px;cursor:pointer;font-family:'DM Sans',sans-serif;">
        Ver detalles ahora
      </button>
    </div>`;

  let n = 3;
  window._exitoTimer = setInterval(()=>{
    n--;
    const el = document.getElementById('exito-cd');
    if(el) el.textContent = n;
    if(n <= 0){ clearInterval(window._exitoTimer); renderReservado(); }
  }, 1000);
}

// ─── TOAST ────────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById('toast');
  clearTimeout(el._timer);
  el.textContent = msg;
  el.style.opacity = '1';
  el._timer = setTimeout(()=>{ el.style.opacity='0'; }, 2500);
}

init();
</script>
</body>
</html>

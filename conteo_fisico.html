<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Totem Nube — Conteo Físico</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="etiquetas_modal.js"></script>
<style>
:root {
  --bg:#0f0f11;--surface:#17171a;--surface2:#1e1e22;--surface3:#252529;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0f0f0;--text2:#888;--text3:#666;
  --green:#00c896;--green-dim:rgba(0,200,150,0.1);--green-border:rgba(0,200,150,0.25);
  --amber:#f5a623;--amber-dim:rgba(245,166,35,0.1);--amber-border:rgba(245,166,35,0.25);
  --red:#ff5e5e;--red-dim:rgba(255,94,94,0.09);--red-border:rgba(255,94,94,0.25);
  --blue:#4d9fff;--blue-dim:rgba(77,159,255,0.09);
  --radius:8px;--radius-lg:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:28px 32px 90px;}

.page-header{margin-bottom:28px;}
.page-title{font-size:20px;font-weight:600;letter-spacing:-0.025em;}
.page-sub{font-size:12px;color:var(--text2);margin-top:3px;}

/* Selector SKU */
.sku-selector{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.sku-selector label{font-size:12px;color:var(--text2);white-space:nowrap;}
select.sku-select{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-size:13px;cursor:pointer;flex:1;min-width:250px;}
select.sku-select:focus{outline:none;border-color:var(--green);}
.btn{padding:8px 16px;font-size:12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.12s;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{background:rgba(255,255,255,0.05);color:var(--text);}
.btn.green{border-color:var(--green);color:var(--green);}
.btn.green:hover{background:var(--green-dim);}
.btn.red{border-color:var(--red);color:var(--red);}
.btn.red:hover{background:var(--red-dim);}

/* Panel principal */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;margin-bottom:16px;}
.panel-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;font-family:'DM Mono',monospace;margin-bottom:16px;}

/* Métricas */
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:20px;}
.metric{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
.metric.green{background:var(--green-dim);border-color:var(--green-border);}
.metric.amber{background:var(--amber-dim);border-color:var(--amber-border);}
.metric.red{background:var(--red-dim);border-color:var(--red-border);}
.metric.blue{background:var(--blue-dim);border-color:rgba(77,159,255,0.25);}
.metric-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-family:'DM Mono',monospace;margin-bottom:5px;}
.metric-value{font-size:24px;font-weight:600;font-family:'DM Mono',monospace;line-height:1;}
.metric.green .metric-value{color:var(--green);}
.metric.amber .metric-value{color:var(--amber);}
.metric.red .metric-value{color:var(--red);}
.metric.blue .metric-value{color:var(--blue);}

/* Tablas de movimientos */
.mov-table{width:100%;border-collapse:collapse;font-size:12px;}
.mov-table th{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-family:'DM Mono',monospace;font-weight:400;padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);}
.mov-table td{padding:8px 8px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
.mov-table tr:last-child td{border-bottom:none;}
.mov-table td.num{font-family:'DM Mono',monospace;text-align:right;font-weight:600;}
.mov-table td.num.pos{color:var(--green);}
.mov-table td.num.neg{color:var(--red);}
.mov-table td.fecha{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);}
.badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;}
.badge.completada{background:rgba(255,255,255,0.05);color:var(--text3);}
.badge.en_produccion{background:var(--green-dim);color:var(--green);}
.badge.asignado{background:var(--blue-dim);color:var(--blue);}
.badge.pendiente{background:var(--amber-dim);color:var(--amber);}
.empty-row{color:var(--text2);font-style:italic;padding:12px 8px;}

/* Sección de conteo */
.conteo-section{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:20px;margin-top:20px;}
.conteo-title{font-size:13px;font-weight:600;margin-bottom:16px;}
.conteo-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.conteo-label{font-size:12px;color:var(--text2);min-width:160px;}
.conteo-input{background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-size:18px;font-family:'DM Mono',monospace;width:100px;text-align:center;}
.conteo-input:focus{outline:none;border-color:var(--green);}

/* Conclusión */
.conclusion{border-radius:var(--radius-lg);padding:18px 20px;margin-top:16px;display:none;}
.conclusion.ok{background:var(--green-dim);border:1px solid var(--green-border);}
.conclusion.alerta{background:var(--amber-dim);border:1px solid var(--amber-border);}
.conclusion.critico{background:var(--red-dim);border:1px solid var(--red-border);}
.conclusion-icon{font-size:20px;margin-bottom:8px;}
.conclusion-title{font-size:14px;font-weight:600;margin-bottom:6px;}
.conclusion-detail{font-size:12px;color:var(--text2);line-height:1.6;}

/* Ajuste */
.ajuste-section{margin-top:16px;display:none;}
.motivo-input{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:10px 12px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;resize:none;min-height:70px;}
.motivo-input:focus{outline:none;border-color:var(--amber);}
.motivo-label{font-size:11px;color:var(--text2);margin-bottom:6px;display:block;}

/* Estado loading */
.loading{color:var(--text3);font-size:12px;padding:20px;text-align:center;}
.error-msg{color:var(--red);font-size:12px;padding:12px;}

/* Barra nav */
.gernav{position:fixed;bottom:0;left:0;right:0;z-index:9999;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 12px;background:rgba(8,10,15,0.97);border-top:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(10px);overflow-x:auto;}
.gernav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border-radius:9px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#7a8099;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;cursor:pointer;text-decoration:none;transition:all 0.15s;white-space:nowrap;flex-shrink:0;}
.gernav-btn:hover{background:rgba(255,255,255,0.07);color:#e8eaf0;border-color:rgba(255,255,255,0.15);}
.gernav-btn.active{background:rgba(0,229,160,0.1);border-color:rgba(0,229,160,0.3);color:#00e5a0;}
.gernav-icon{font-size:16px;line-height:1;}

/* Selector categoría */
.cat-sku-selector{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;}
.selector-row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
.selector-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:180px;}
.selector-label{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.06em;}
select.form-sel{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-size:13px;cursor:pointer;width:100%;}
select.form-sel:focus{outline:none;border-color:var(--green);}

/* Semáforo de conteos */
.semaforo-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:16px;}
.semaforo-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;font-family:'DM Mono',monospace;margin-bottom:12px;}
.semaforo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px;}
.semaforo-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface2);border-radius:6px;border:1px solid var(--border);cursor:pointer;transition:border-color 0.12s;}
.semaforo-item:hover{border-color:var(--border2);}
.semaforo-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.semaforo-dot.verde{background:var(--green);}
.semaforo-dot.amarillo{background:var(--amber);}
.semaforo-dot.rojo{background:var(--red);}
.semaforo-nombre{font-size:11px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.semaforo-fecha{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap;}

/* Semáforo header colapsable */
.semaforo-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;margin-bottom:0;}
.semaforo-header.open .semaforo-arrow{transform:rotate(180deg);}
.semaforo-arrow{font-size:12px;color:var(--text3);transition:transform 0.2s;}
.semaforo-body{overflow:hidden;transition:max-height 0.25s ease;max-height:0;}
.semaforo-body.open{max-height:2000px;}
.semaforo-filters{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.semaforo-filter{padding:4px 12px;border-radius:20px;font-size:11px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all 0.12s;font-family:'DM Sans',sans-serif;}
.semaforo-filter.active{background:var(--surface2);color:var(--text);border-color:var(--green);}

/* Variantes en conteo */
.variante-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;}
.variante-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.variante-nombre{font-size:13px;font-weight:600;}
.variante-stock{font-size:11px;color:var(--text2);}
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">📦 Conteo Físico</div>
  <div class="page-sub">Verificación de stock real vs registrado</div>
</div>

<!-- Selector categoría + SKU -->
<div class="cat-sku-selector">
  <div class="selector-row">
    <div class="selector-group">
      <span class="selector-label">Categoría</span>
      <select class="form-sel" id="cat-select" onchange="filtrarSkusPorCat()">

        <option value="">— Seleccioná un SKU —</option>

      <button class="semaforo-filter" onclick="filtrarSemaforo('amarillo',this)">🟡 Demorados</button>
      <button class="semaforo-filter" onclick="filtrarSemaforo('verde',this)">🟢 Al día</button>

<script>
const SUPA_URL = localStorage.getItem('supa_url') || 'https://nkkwukcgxyhudprlhjjw.supabase.co';
const SUPA_KEY = localStorage.getItem('supa_key') || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ra3d1a2NneHlodWRwcmxoamp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMjAzNTQsImV4cCI6MjA5MzU5NjM1NH0.NGDzPGnChtqYbnjcIZhso1CUozqG_JQ7TyElKSesy5s';
const READONLY = new URLSearchParams(window.location.search).get('mode') === 'readonly';

async function api(path, method='GET', body=null){
  if(!SUPA_URL || !SUPA_KEY) throw new Error('Sin configuración Supabase. Configurá desde Stock → Configuración.');
  const opts = {
    method,
    headers:{
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Prefer': method==='POST' ? 'return=representation' : ''
    }
  };
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPA_URL + '/rest/v1/' + path, opts);
  if(!res.ok){ const err = await res.text(); throw new Error(err); }
  if(res.status===204) return null;
  return res.json();
}

function fmt_fecha(str){
  if(!str) return '—';
  return new Date(str).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'});
}

// ─── Cargar lista de SKUs ───────────────────────────────────────────────────
let _todosLosSkus = [];
let _ultimosConteos = {};

async function cargarSkus(){
  try {
    // Cargar SKUs y categorías
    const skus = await api('skus?select=id,codigo,nombre,tracking,categorias(id,nombre)&activo=eq.true&order=nombre.asc');
    _todosLosSkus = skus || [];

    // Cargar últimos conteos por SKU
    const conteos = await api('stock_conteos?select=sku_id,fecha,cantidad_contada,diferencia&order=fecha.desc').catch(()=>[]);
    _ultimosConteos = {};
    (conteos||[]).forEach(c=>{
      if(!_ultimosConteos[c.sku_id]) _ultimosConteos[c.sku_id] = c;
    });

    // Poblar select de categorías
    const cats = [...new Map(_todosLosSkus.map(s=>[s.categorias?.id, s.categorias]).filter(([id])=>id)).values()];
    const catSel = document.getElementById('cat-select');
    cats.sort((a,b)=>(a.nombre||'').localeCompare(b.nombre||'')).forEach(c=>{
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.nombre;
      catSel.appendChild(opt);
    });

    // Poblar SKUs (todos inicialmente)
    filtrarSkusPorCat();

    // Renderizar semáforo
    renderSemaforo();

  } catch(e){
    document.getElementById('conteo-content').innerHTML = `<div class="error-msg">Error cargando datos: ${e.message}</div>`;
  }
}

function filtrarSkusPorCat(){
  const catId = document.getElementById('cat-select').value;
  const sel = document.getElementById('sku-select');
  const valorActual = sel.value;
  sel.innerHTML = '<option value="">— Seleccioná un SKU —</option>';
  const filtrados = catId
    ? _todosLosSkus.filter(s => String(s.categorias?.id) === catId)
    : _todosLosSkus;
  filtrados.forEach(s=>{
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.dataset.tracking = s.tracking||'cantidad';
    opt.textContent = `${s.nombre} (${s.tracking==='uid'?'UID':'Cantidad'})`;
    sel.appendChild(opt);
  });
  if(valorActual) sel.value = valorActual;
}

function diasDesde(fechaStr){
  if(!fechaStr) return null;
  return Math.floor((Date.now() - new Date(fechaStr).getTime()) / 86400000);
}

let _semaforoFiltro = 'todos';
let _semaforoAbierto = false;

function toggleSemaforo(){
  _semaforoAbierto = !_semaforoAbierto;
  const body = document.getElementById('semaforo-body');
  const header = document.getElementById('semaforo-header');
  if(_semaforoAbierto){
    body.classList.add('open');
    header.classList.add('open');
  } else {
    body.classList.remove('open');
    header.classList.remove('open');
  }
}

function filtrarSemaforo(filtro, btn){
  _semaforoFiltro = filtro;
  document.querySelectorAll('.semaforo-filter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderSemaforo();
}

function renderSemaforo(){
  const grid = document.getElementById('semaforo-grid');
  if(!grid) return;
  const items = _todosLosSkus.map(s=>{
    const conteo = _ultimosConteos[s.id];
    const dias = conteo ? diasDesde(conteo.fecha) : null;
    let color, label;
    if(dias === null){ color='rojo'; label='Nunca contado'; }
    else if(dias <= 30){ color='verde'; label=`Hace ${dias}d`; }
    else if(dias <= 60){ color='amarillo'; label=`Hace ${dias}d`; }
    else { color='rojo'; label=`Hace ${dias}d`; }
    return {s, color, label};
  }).sort((a,b)=>{
    const orden = {rojo:0,amarillo:1,verde:2};
    return orden[a.color]-orden[b.color];
  });

  const filtrados = _semaforoFiltro === 'todos' ? items : items.filter(i=>i.color===_semaforoFiltro);
  grid.innerHTML = filtrados.length ? filtrados.map(({s,color,label})=>`
    <div class="semaforo-item" onclick="seleccionarDesdeSemaforo(${s.id}, ${s.categorias?.id||'null'})">
      <div class="semaforo-dot ${color}"></div>
      <span class="semaforo-nombre">${s.nombre}</span>
      <span class="semaforo-fecha">${label}</span>
    </div>
  `).join('') : `<div style="color:var(--text3);font-size:12px;padding:8px;">Sin insumos en esta categoría de control.</div>`;
}

function seleccionarDesdeSemaforo(skuId, catId){
  if(catId){
    const catSel = document.getElementById('cat-select');
    catSel.value = catId;
    filtrarSkusPorCat();
  }
  const sel = document.getElementById('sku-select');
  sel.value = skuId;
  iniciarConteo();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ─── Iniciar conteo ─────────────────────────────────────────────────────────
async function iniciarConteo(){
  const sel = document.getElementById('sku-select');
  const skuId = parseInt(sel.value);
  if(!skuId){ alert('Seleccioná un SKU primero.'); return; }
  const tracking = sel.options[sel.selectedIndex].dataset.tracking;
  const nombre = sel.options[sel.selectedIndex].textContent.replace(/\s*\(.*\)$/,'').trim();

  const content = document.getElementById('conteo-content');
  content.innerHTML = '<div class="loading">Cargando datos...</div>';

  try {
    if(tracking === 'uid'){
      await renderUID(skuId, nombre, content);
    } else {
      await renderCantidad(skuId, nombre, content);
    }
  } catch(e){
    content.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  }
}

// ─── TRACKING UID ──────────────────────────────────────────────────────────

          <div class="metric-value" style="color:var(--blue);">${emitidas}</div>
        </div>
        <div class="metric green">
          <div class="metric-label">En depósito (stock)</div>
          <div class="metric-value">${enStock}</div>
        </div>
        <div class="metric amber">
          <div class="metric-label">Asignadas a OPs</div>
          <div class="metric-value" style="color:var(--amber);">${asignadas}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Producidas / salidas</div>
          <div class="metric-value" style="color:var(--text2);">${producidas}</div>
        </div>
        ${baja>0?`<div class="metric red"><div class="metric-label">Baja</div><div class="metric-value">${baja}</div></div>`:''}
      </div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:16px;">
        <strong style="color:var(--text);">Teórico en depósito: ${teorico}</strong> 
        <span style="color:var(--text3);">(stock ${enStock} + asignadas ${asignadas})</span>
      </div>

      <!-- Tabla de unidades -->
      <div class="panel-title">📋 Detalle de unidades emitidas</div>

        <thead><tr>

        <tbody>
          ${(unidades||[]).length === 0
            ? `<tr><td colspan="4" class="empty-row">Sin unidades registradas</td></tr>`

// ─── TRACKING CANTIDAD ─────────────────────────────────────────────────────
async function renderCantidad(skuId, nombre, content){
  // Entradas por recepción
  const ocItems = await api(`oc_items?sku_id=eq.${skuId}&select=id,oc_id`).catch(()=>[]);
  const ocItemIds = (ocItems||[]).map(i=>i.id);
  const ocIds = [...new Set((ocItems||[]).map(i=>i.oc_id).filter(Boolean))];

  const recItems = ocItemIds.length
    ? await api(`recepcion_items?oc_item_id=in.(${ocItemIds.join(',')})&ingresado_a_stock=eq.true&select=cantidad_recibida,color_recibido,oc_item_id,recepcion_id,recepciones(recepcion_numero,created_at,oc_id)`).catch(()=>[])
    : [];

  const ocs = ocIds.length
    ? await api(`ordenes_compra?id=in.(${ocIds.join(',')})&select=id,oc_numero,proveedores(razon_social)`).catch(()=>[])
    : [];
  const ocMap = {};
  (ocs||[]).forEach(o=>{ ocMap[o.id] = o; });

  // Ajustes (con variante_id si existe)
  const ajustes = await api(`stock_ajustes?sku_id=eq.${skuId}&select=*&order=created_at.asc`).catch(()=>[]);

  // Salidas reales: solo items escaneados (uid_asignado IS NOT NULL), con variante_id
  const bomItemsTodos = await api(
    `op_bom_items?sku_id=eq.${skuId}&incluido=eq.true&estado=eq.asignado&uid_asignado=not.is.null&select=op_id,variante_id,ordenes_produccion(op_numero,cliente,estado,updated_at)`
  ).catch(()=>[]);
  // Para el cálculo del saldo teórico, solo contar OPs activas
  // (stock.cantidad ya descuenta las completadas tras el fix de ejecutarCierreOP)
  const _estadosActivosCF = ['iniciada','bom_pendiente','bom_confirmada','en_produccion'];
  const bomItems = (bomItemsTodos||[]).filter(b => _estadosActivosCF.includes(b.ordenes_produccion?.estado));

  // Stock actual desde tabla stock (fuente de verdad)
  const stockRows = await api(`stock?sku_id=eq.${skuId}&select=id,cantidad,variante_id,variantes(valor)`).catch(()=>[]);
  const tieneVariantes = (stockRows||[]).some(r=>r.variante_id !== null);

  if(tieneVariantes){
    // ── Modo por variante ──────────────────────────────────────────────────
    const stockActualTotal = (stockRows||[]).reduce((s,r)=>s+(r.cantidad||0),0);
    const totalSalidasTotal = (bomItems||[]).length;
    const saldoTotal = stockActualTotal - totalSalidasTotal;

    // Construir HTML de cada variante
    const variantesHtml = (stockRows||[]).map(row=>{
      const varId   = row.variante_id;
      const varNom  = row.variantes?.valor || 'Sin variante';
      const stockVar = row.cantidad || 0;

      // Entradas de esta variante: por color_recibido (texto) que coincida con el nombre de variante
      const recVar = (recItems||[]).filter(e=>{
        const colorRec = (e.color_recibido||'').toLowerCase().trim();
        const colorVar = varNom.toLowerCase().trim();
        return colorRec === colorVar || colorRec === '' && stockRows.length === 1;
      });

      // Ajustes de esta variante
      const ajVar = (ajustes||[]).filter(a=> a.variante_id === varId || (!a.variante_id && stockRows.length === 1));

      // Salidas de esta variante (solo OPs activas)
      const bomVar = (bomItems||[]).filter(b=> b.variante_id === varId || (!b.variante_id && stockRows.length === 1));

      // Agrupar salidas por OP
      const salidaMap = {};
      bomVar.forEach(s=>{
        const opNum = s.ordenes_produccion?.op_numero || ('op_'+s.op_id);
        if(!salidaMap[opNum]){ salidaMap[opNum] = { ...s, qty: 1 }; }
        else { salidaMap[opNum].qty += 1; }
      });
      const salidasVar = Object.values(salidaMap);
      const totalSalidasVar = salidasVar.reduce((s,e)=>s+(e.qty||0),0);
      const totalEntradasVar = recVar.reduce((s,e)=>s+(e.cantidad_recibida||0),0);
      const totalAjustesVar  = ajVar.reduce((s,a)=>s+(a.diferencia||0),0);
      const saldoVar = stockVar - totalSalidasVar;
      const sinRecVar = !recVar.length && !ajVar.length;

      return `
        <div class="variante-card" style="margin-bottom:18px;">
          <div class="variante-header">
            <span class="variante-nombre">● ${varNom}</span>
            <span class="variante-stock ${saldoVar<=0?'red':saldoVar<=3?'amber':'green'}" style="font-family:'DM Mono',monospace;font-weight:600;color:${saldoVar<=0?'var(--red)':saldoVar<=3?'var(--amber)':'var(--green)'};">
              Disponible: ${saldoVar}
            </span>
          </div>
          <div class="metrics" style="margin-bottom:12px;">
            <div class="metric green">
              <div class="metric-label">Entradas</div>
              <div class="metric-value">+${sinRecVar ? stockVar : (totalEntradasVar + totalAjustesVar)}</div>
            </div>
            <div class="metric red">
              <div class="metric-label">Salidas</div>
              <div class="metric-value">−${totalSalidasVar}</div>
            </div>
            <div class="metric ${saldoVar<=0?'red':saldoVar<=3?'amber':'green'}">
              <div class="metric-label">Saldo sistema</div>
              <div class="metric-value">${saldoVar}</div>
            </div>
          </div>

          <div class="panel-title">▼ ENTRADAS</div>
          <table class="mov-table">
            <thead><tr><th>Fecha</th><th>Proveedor</th><th>OC · Recepción</th><th style="text-align:right;">Cant.</th></tr></thead>
            <tbody>
              ${sinRecVar
                ? `<tr>
                    <td class="fecha">—</td>
                    <td style="font-style:italic;color:var(--amber);">Stock inicial cargado manualmente</td>
                    <td style="font-size:11px;color:var(--text3);">Sin recepción formal registrada</td>
                    <td class="num pos">+${stockVar}</td>
                  </tr>`
                : [
                    ...recVar.map(e=>{
                      const rec  = e.recepciones;
                      const oc   = rec?.oc_id ? ocMap[rec.oc_id] : null;
                      const prov = oc?.proveedores?.razon_social || '—';
                      return `<tr>
                        <td class="fecha">${fmt_fecha(rec?.created_at)}</td>
                        <td>${prov}</td>
                        <td style="font-size:11px;color:var(--text3);">${oc?.oc_numero||'—'} · ${rec?.recepcion_numero||'—'}</td>
                        <td class="num pos">+${e.cantidad_recibida||0}</td>
                      </tr>`;
                    }),
                    ...ajVar.map(a=>`<tr>
                      <td class="fecha">${fmt_fecha(a.created_at)}</td>
                      <td style="font-style:italic;color:var(--text3);">Ajuste conteo físico</td>
                      <td style="font-size:11px;color:var(--text3);">${a.motivo||''}</td>
                      <td class="num ${a.diferencia>=0?'pos':'neg'}">${a.diferencia>=0?'+':''}${a.diferencia}</td>
                    </tr>`)
                  ].join('')
              }
            </tbody>
          </table>

          <div class="panel-title" style="margin-top:14px;">▼ SALIDAS (asignadas a OPs)</div>
          <table class="mov-table">
            <thead><tr><th>Fecha</th><th>OP</th><th>Cliente · Estado</th><th style="text-align:right;">Cant.</th></tr></thead>
            <tbody>
              ${!salidasVar.length
                ? `<tr><td colspan="4" class="empty-row">Sin asignaciones registradas</td></tr>`
                : salidasVar.map(s=>{
                    const op = s.ordenes_produccion;
                    return `<tr>
                      <td class="fecha">${fmt_fecha(op?.updated_at)}</td>
                      <td style="font-family:'DM Mono',monospace;font-size:11px;">${op?.op_numero||'—'}</td>
                      <td>${op?.cliente||'—'} <span class="badge ${op?.estado}">${op?.estado||'—'}</span></td>
                      <td class="num neg">−${s.qty||0}</td>
                    </tr>`;
                  }).join('')
              }
            </tbody>
          </table>
        </div>
      `;
    }).join('');

    content.innerHTML = `
      <div class="panel">
        <div class="panel-title">📊 ${nombre} — Movimientos por variante</div>
        <div class="metrics" style="margin-bottom:20px;">
          <div class="metric blue">
            <div class="metric-label">Stock total sistema</div>
            <div class="metric-value" style="color:var(--blue);">${stockActualTotal}</div>
          </div>
          <div class="metric red">
            <div class="metric-label">Total salidas</div>
            <div class="metric-value">−${totalSalidasTotal}</div>
          </div>
          <div class="metric ${saldoTotal<=0?'red':saldoTotal<=3?'amber':'green'}">
            <div class="metric-label">Disponible total</div>
            <div class="metric-value">${saldoTotal}</div>
          </div>
        </div>
        ${variantesHtml}
        ${renderConteoInput(skuId, nombre, saldoTotal, 'cantidad', stockRows)}
      </div>
    `;

  } else {
    // ── Modo sin variantes (lógica original) ──────────────────────────────
    const stockActual = (stockRows||[]).reduce((s,r)=>s+(r.cantidad||0),0);
    const totalEntradas = (recItems||[]).reduce((s,e)=>s+(e.cantidad_recibida||0),0);
    const totalAjustes  = (ajustes||[]).reduce((s,a)=>s+(a.diferencia||0),0);

    // Agrupar salidas por OP
    const salidaMap = {};
    (bomItems||[]).forEach(s=>{
      const opNum = s.ordenes_produccion?.op_numero || ('op_'+s.op_id);
      if(!salidaMap[opNum]){ salidaMap[opNum] = { ...s, qty: 1 }; }
      else { salidaMap[opNum].qty += 1; }
    });
    const salidas = Object.values(salidaMap);
    const totalSalidas = salidas.reduce((s,e)=>s+(e.qty||0),0);
    const saldoTeorico = stockActual - totalSalidas;

    content.innerHTML = `
      <div class="panel">
        <div class="panel-title">📊 ${nombre} — Movimientos registrados</div>
        <div class="metrics">
          <div class="metric green">
            <div class="metric-label">Total entradas</div>
            <div class="metric-value">+${!(recItems||[]).length && !(ajustes||[]).length ? stockActual : (totalEntradas + totalAjustes)}</div>
          </div>
          <div class="metric red">
            <div class="metric-label">Total salidas</div>
            <div class="metric-value">−${totalSalidas}</div>
          </div>
          <div class="metric ${saldoTeorico<=0?'red':saldoTeorico<=3?'amber':'green'}">
            <div class="metric-label">Saldo teórico</div>
            <div class="metric-value">${saldoTeorico}</div>
          </div>
        </div>

        <!-- Entradas -->
        <div class="panel-title">▼ ENTRADAS</div>
        <table class="mov-table">
          <thead><tr><th>Fecha</th><th>Proveedor</th><th>OC · Recepción</th><th style="text-align:right;">Cant.</th></tr></thead>
          <tbody>
            ${!(recItems||[]).length && !(ajustes||[]).length
              ? `<tr>
                  <td class="fecha">—</td>
                  <td style="font-style:italic;color:var(--amber);">Stock inicial cargado manualmente</td>
                  <td style="font-size:11px;color:var(--text3);">Sin recepción formal registrada</td>
                  <td class="num pos">+${stockActual}</td>
                </tr>`
              : [
                  ...(recItems||[]).map(e=>{
                    const rec  = e.recepciones;
                    const oc   = rec?.oc_id ? ocMap[rec.oc_id] : null;
                    const prov = oc?.proveedores?.razon_social || '—';
                    const color = e.color_recibido ? `<span style="font-size:10px;color:#ff9900;margin-left:6px;">● ${e.color_recibido}</span>` : '';
                    return `<tr>
                      <td class="fecha">${fmt_fecha(rec?.created_at)}</td>
                      <td>${prov}${color}</td>
                      <td style="font-size:11px;color:var(--text3);">${oc?.oc_numero||'—'} · ${rec?.recepcion_numero||'—'}</td>
                      <td class="num pos">+${e.cantidad_recibida||0}</td>
                    </tr>`;
                  }),
                  ...(ajustes||[]).map(a=>`<tr>
                    <td class="fecha">${fmt_fecha(a.created_at)}</td>
                    <td style="font-style:italic;color:var(--text3);">Ajuste conteo físico</td>
                    <td style="font-size:11px;color:var(--text3);">${a.motivo||''}</td>
                    <td class="num ${a.diferencia>=0?'pos':'neg'}">${a.diferencia>=0?'+':''}${a.diferencia}</td>
                  </tr>`)
                ].join('')
            }
          </tbody>
        </table>

        <!-- Salidas -->
        <div class="panel-title" style="margin-top:18px;">▼ SALIDAS (asignadas a OPs)</div>
        <table class="mov-table">
          <thead><tr><th>Fecha</th><th>OP</th><th>Cliente · Estado</th><th style="text-align:right;">Cant.</th></tr></thead>
          <tbody>
            ${!salidas.length
              ? `<tr><td colspan="4" class="empty-row">Sin asignaciones registradas</td></tr>`
              : salidas.map(s=>{
                  const op = s.ordenes_produccion;
                  return `<tr>
                    <td class="fecha">${fmt_fecha(op?.updated_at)}</td>
                    <td style="font-family:'DM Mono',monospace;font-size:11px;">${op?.op_numero||'—'}</td>

    if(!READONLY){
      const inp = document.getElementById('input-conteo');
      if(inp) inp.addEventListener('input', ()=>calcularConclusion(saldoTeorico, nombre, skuId));

  }
}

// ─── HTML del input de conteo ──────────────────────────────────────────────

    return `
      <div class="conteo-section" style="opacity:0.5;pointer-events:none;">
        <div class="conteo-title">🔒 Solo consulta — saldo teórico en sistema: ${teorico}</div>
      </div>

  const tieneVar = (stockRows||[]).some(r=>r.variante_id !== null);
  if(tieneVar){
    const variantesHtml = (stockRows||[]).map(r=>`
      <div class="variante-card">
        <div class="variante-header">
          <span class="variante-nombre">● ${r.variantes?.valor||'Sin variante'}</span>
          <span class="variante-stock">Stock sistema: ${r.cantidad||0}</span>

                 oninput="calcularConclusionVariantes(${skuId},'${nombre.replace(/'/g,"\'")}')">
        </div>
        <div class="variante-conclusion" id="concl-var-${r.variante_id}"></div>
      </div>
    `).join('');
    return `
      <div class="conteo-section">
        <div class="conteo-title">🔢 Conteo por variante</div>
        <input type="hidden" id="input-conteo" data-sku-id="${skuId}" data-nombre="${nombre.replace(/"/g,'&quot;')}" data-teorico="${teorico}" data-tracking="${tracking}">
        ${variantesHtml}
        <div id="conclusion-box"></div>
        <div id="ajuste-section" class="ajuste-section">
          <div id="motivo-wrap">
            <label class="motivo-label" id="motivo-label">Motivo del ajuste (obligatorio si hay diferencias):</label>
            <textarea id="input-motivo" class="motivo-input" placeholder="Ej: Unidades dañadas, robo, error de carga..."></textarea>
          </div>
          <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;">
            <button class="btn green" id="btn-confirmar-ajuste" onclick="confirmarAjusteVariantes(${skuId},'${nombre.replace(/'/g,"\'")}')">✓ Confirmar conteo</button>
            <button class="btn" onclick="cancelarAjuste()">Cancelar</button>
          </div>
        </div>
      </div>
    `;
  }
  return `
    <div class="conteo-section">
      <div class="conteo-title">🔢 Ingresá el conteo físico real</div>
      <div class="conteo-row">
        <span class="conteo-label">Saldo teórico en sistema:</span>
        <span style="font-family:'DM Mono',monospace;font-size:18px;font-weight:600;color:var(--text);">${enStockUID !== undefined ? enStockUID : teorico}</span>
      </div>
      ${enStockUID !== undefined ? `<div style="font-size:11px;color:var(--text3);margin-bottom:10px;font-family:'DM Mono',monospace;">
        Comparando contra <strong style="color:var(--green);">${enStockUID} en stock</strong> + <strong style="color:var(--amber);">${asignadasUID} asignadas a OPs</strong> = ${teorico} teórico
      </div>` : ''}
      <div class="conteo-row">
        <span class="conteo-label">Cantidad contada físicamente:</span>
        <input type="number" id="input-conteo" class="conteo-input" min="0" placeholder="0"
               data-sku-id="${skuId}" data-nombre="${nombre.replace(/"/g,'&quot;')}" 
               data-teorico="${enStockUID !== undefined ? enStockUID : teorico}" data-tracking="${tracking}">
      </div>
      <div id="conclusion-box"></div>
      <div id="ajuste-section" class="ajuste-section">
        <div id="motivo-wrap">
          <label class="motivo-label" id="motivo-label">Motivo del ajuste (obligatorio):</label>
          <textarea id="input-motivo" class="motivo-input" placeholder="Ej: Unidades dañadas descartadas, error de carga inicial, robo, etc."></textarea>
        </div>
        <div style="display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;">
          <button class="btn green" id="btn-confirmar-ajuste" onclick="confirmarAjuste()">✓ Confirmar ajuste</button>
          <button class="btn" onclick="cancelarAjuste()">Cancelar</button>
        </div>
      </div>
    </div>
  `;
}

// ─── Calcular conclusión (cantidad) ───────────────────────────────────────
function calcularConclusion(teorico, nombre, skuId){
  const input = document.getElementById('input-conteo');
  const val = input.value.trim();
  if(val === '') { limpiarConclusion(); return; }
  const conteo = parseInt(val);
  if(isNaN(conteo) || conteo < 0) { limpiarConclusion(); return; }
  mostrarConclusion(conteo, teorico, nombre, skuId);
}

// ─── Calcular conclusión (uid) ────────────────────────────────────────────
function calcularConclusionUID(teorico, nombre, skuId){
  calcularConclusion(teorico, nombre, skuId);
}

// ─── Mostrar conclusión ───────────────────────────────────────────────────
function mostrarConclusion(conteo, teorico, nombre, skuId){
  const box = document.getElementById('conclusion-box');
  const ajusteSection = document.getElementById('ajuste-section');
  const diferencia = conteo - teorico;

  let tipo, icon, titulo, detalle;

  const esUID = document.getElementById('input-conteo')?.dataset.tracking === 'uid';

  if(diferencia === 0){
    tipo = 'ok';
    icon = '✅';
    titulo = 'Coincide — sin diferencias';
    detalle = `El conteo físico (${conteo}) coincide con el saldo del sistema (${teorico}). Registrá el conteo para dejar constancia del control.`;
    ajusteSection.style.display = 'block';
    ajusteSection.dataset.sinDiferencia = 'true';
  } else if(esUID && diferencia > 0){
    // UID con unidades de más: hay unidades físicas sin etiqueta
    tipo = 'alerta';
    icon = '⚠️';
    titulo = `Hay ${diferencia} unidad(es) sin etiqueta`;
    detalle = `El sistema registra ${teorico} unidades pero contaste ${conteo}. `
      + `Las ${diferencia} unidad(es) de más no tienen UID asignado. `
      + `Registrá el conteo e indicá la variante para que quede trazabilidad.`;
    ajusteSection.style.display = 'block';
    // Cambiar botón para que registre el conteo con variante
    const btnConfirmar = document.getElementById('btn-confirmar-ajuste');
    if(btnConfirmar){ 
      btnConfirmar.textContent = '✓ Registrar conteo';
      btnConfirmar.className = 'btn amber';
    }
    const motivoWrap = document.getElementById('motivo-wrap');
    const motivoLabel = document.getElementById('motivo-label');
    if(motivoWrap) motivoWrap.style.display = 'block';
    if(motivoLabel) motivoLabel.textContent = 'Observaciones (opcional):';
    // Cargar selector de variante si el SKU las tiene
    setTimeout(() => cargarSelectorVarianteUID(skuId, diferencia), 50);
  } else if(esUID && diferencia < 0){
    // UID con unidades de menos: UIDs registrados que no se encontraron físicamente
    tipo = 'critico';
    icon = '🔴';
    titulo = `Faltan ${Math.abs(diferencia)} unidad(es) físicas`;
    detalle = `El sistema registra ${teorico} unidades pero solo contaste ${conteo}. `
      + `Hay ${Math.abs(diferencia)} UID(s) que no se encontraron físicamente. `
      + `Revisá el detalle de unidades arriba para identificar cuáles faltan.`;
    ajusteSection.style.display = 'block';
  } else if(Math.abs(diferencia) <= 2){
    tipo = 'alerta';
    icon = '⚠️';
    titulo = `Diferencia menor: ${diferencia > 0 ? '+' : ''}${diferencia} unidades`;
    detalle = `El sistema dice ${teorico} pero contaste ${conteo}. `
      + `${diferencia > 0
        ? `Hay ${diferencia} unidad(es) de más en el depósito sin registro.`
        : `Faltan ${Math.abs(diferencia)} unidad(es). Revisá si hubo una salida sin escanear.`
      } Si confirmás el ajuste, el sistema va a quedar en ${conteo}.`;
    ajusteSection.style.display = 'block';
  } else {
    tipo = 'critico';
    icon = '🔴';
    titulo = `Diferencia importante: ${diferencia > 0 ? '+' : ''}${diferencia} unidades`;
    detalle = `El sistema dice ${teorico} pero contaste ${conteo}. `
      + `${diferencia > 0
        ? `Hay ${diferencia} unidades de más sin trazabilidad. Revisá si hay recepciones no registradas.`
        : `Faltan ${Math.abs(diferencia)} unidades. Revisá el historial de salidas.`
      } Se requiere una justificación clara antes de ajustar.`;
    ajusteSection.style.display = 'block';
  }

  box.innerHTML = `
    <div class="conclusion ${tipo}" id="conclusion-final" 
         data-diferencia="${diferencia}" data-conteo="${conteo}" data-sku-id="${skuId}" data-nombre="${nombre.replace(/"/g,'&quot;')}" data-tracking="${document.getElementById('input-conteo')?.dataset?.tracking||''}">
      <div class="conclusion-icon">${icon}</div>
      <div class="conclusion-title">${titulo}</div>
      <div class="conclusion-detail">${detalle}</div>
    </div>
  `;
  // Adaptar UI según si hay diferencia o no
  const motivoWrap = document.getElementById('motivo-wrap');
  const motivoLabel = document.getElementById('motivo-label');
  const btnConfirmar = document.getElementById('btn-confirmar-ajuste');
  if(diferencia === 0){
    if(motivoWrap) motivoWrap.style.display = 'none';
    if(btnConfirmar){ btnConfirmar.textContent = '✓ Registrar conteo sin novedad'; btnConfirmar.className = 'btn green'; }
  } else {
    if(motivoWrap) motivoWrap.style.display = 'block';
    if(motivoLabel) motivoLabel.textContent = 'Motivo del ajuste (obligatorio):';
    if(btnConfirmar){ btnConfirmar.textContent = '✓ Confirmar ajuste'; btnConfirmar.className = 'btn green'; }
  }
}

function limpiarConclusion(){
  const box = document.getElementById('conclusion-box');
  const ajusteSection = document.getElementById('ajuste-section');
  if(box) box.innerHTML = '';
  if(ajusteSection) ajusteSection.style.display = 'none';
}

// ─── Selector de variante para ajuste positivo UID ───────────────────────────
async function cargarSelectorVarianteUID(skuId, diferencia){
  const motivoWrap = document.getElementById('motivo-wrap');
  if(!motivoWrap) return;

  // Verificar si ya hay selector
  if(document.getElementById('variante-uid-wrap')) return;

  // Consultar variantes del SKU
  let variantes = [];
  try { variantes = await api(`variantes?sku_id=eq.${skuId}&activo=eq.true&select=id,valor&order=valor.asc`); }
  catch(e){ return; }

  if(!variantes || !variantes.length) return; // Sin variantes → no mostrar selector

  const wrap = document.createElement('div');
  wrap.id = 'variante-uid-wrap';
  wrap.style.cssText = 'margin-top:12px;padding:12px;background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.3);border-radius:8px;';
  wrap.innerHTML = `
    <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:6px;">
      Variante de la${diferencia > 1 ? 's ' + diferencia : ''} unidad${diferencia > 1 ? 'es' : ''} encontrada${diferencia > 1 ? 's' : ''} <span style="color:var(--amber);">*</span>
    </label>
    <select id="variante-uid-select" style="height:32px;font-size:13px;padding:4px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--surface);color:var(--text);width:100%;">
      <option value="">— Seleccioná la variante —</option>
      ${variantes.map(v => `<option value="${v.id}">${v.valor}</option>`).join('')}
    </select>
    <div style="font-size:11px;color:var(--text3);margin-top:6px;">
      Esto queda registrado en el ajuste para trazabilidad.
    </div>
  `;
  motivoWrap.insertAdjacentElement('afterend', wrap);
}

// ─── Confirmar ajuste ─────────────────────────────────────────────────────
async function confirmarAjuste(){
  const sinDif = parseInt(document.getElementById('conclusion-final')?.dataset.diferencia||'1') === 0;
  const motivo = document.getElementById('input-motivo')?.value.trim() || '';
  if(!sinDif && !motivo){ alert('Ingresá un motivo para el ajuste.'); return; }

  // Si es UID con diferencia positiva y hay selector de variante, validarlo
  const varianteSelect = document.getElementById('variante-uid-select');
  const varianteUIDId = varianteSelect ? parseInt(varianteSelect.value) || null : null;
  if(varianteSelect && !varianteUIDId){
    alert('Seleccioná la variante de la unidad encontrada antes de confirmar.');
    return;
  }

  const conclusion = document.getElementById('conclusion-final');
  if(!conclusion) return;

  const diferencia = parseInt(conclusion.dataset.diferencia);
  const conteo     = parseInt(conclusion.dataset.conteo);
  const skuId      = parseInt(conclusion.dataset.skuId);
  const nombre     = conclusion.dataset.nombre;

  const input = document.getElementById('input-conteo');
  const tracking = conclusion.dataset.tracking || input?.dataset?.tracking || '';

  try {
    const usuario = localStorage.getItem('tn_usuario') || 'Gerencia';
    const teorico = parseInt(document.getElementById('input-conteo').dataset.teorico) || 0;

    // 1. Registrar SIEMPRE en stock_conteos
    await api('stock_conteos', 'POST', {
      sku_id: skuId,
      cantidad_teorica: teorico,
      cantidad_contada: conteo,
      diferencia: diferencia,
      hubo_ajuste: diferencia !== 0,
      usuario: usuario,
      notas: diferencia !== 0 ? `Conteo físico — ${motivo}` : 'Conteo sin novedad'
    });

    // 2. Si hay diferencia → registrar en stock_ajustes
    if(diferencia !== 0){
      await api('stock_ajustes', 'POST', {
        sku_id: skuId,
        cantidad_contada: conteo,
        cantidad_anterior: teorico,
        diferencia: diferencia,
        motivo: `Conteo físico — ${motivo}`,
        usuario: usuario,
        ...(varianteUIDId ? { variante_id: varianteUIDId } : {})
      });

      // 3. Actualizar stock.cantidad si tracking=cantidad
      // stock.cantidad = conteo_caja + escaneados_en_produccion_ACTIVA
      if(tracking === 'cantidad'){
        // Solo contar ítems de OPs activas (no completadas/canceladas)
        const _estadosActivos = ['iniciada','bom_pendiente','bom_confirmada','en_produccion'];
        const escaneados = await api(`op_bom_items?sku_id=eq.${skuId}&uid_asignado=not.is.null&estado=eq.asignado&select=id,ordenes_produccion(estado)`).catch(()=>[]);
        const totalEscaneados = (escaneados||[]).filter(e => _estadosActivos.includes(e.ordenes_produccion?.estado)).length;
        // El total real = lo que hay en la caja + lo que ya salió a producción
        const cantidadTotal = conteo + totalEscaneados;
        const stockExist = await api(`stock?sku_id=eq.${skuId}&select=id,cantidad`).catch(()=>[]);
        if(stockExist?.length){
          await api(`stock?sku_id=eq.${skuId}`, 'PATCH', { cantidad: cantidadTotal });
        } else {
          await api('stock', 'POST', { sku_id: skuId, cantidad: cantidadTotal });
        }
      }
    }

    // Actualizar semáforo en memoria
    _ultimosConteos[skuId] = { sku_id: skuId, fecha: new Date().toISOString(), cantidad_contada: conteo, diferencia };
    renderSemaforo();

    // Feedback + recarga del historial
    document.getElementById('ajuste-section').style.display = 'none';
    document.getElementById('conclusion-box').innerHTML = `
      <div class="conclusion ok">
        <div class="conclusion-icon">✅</div>
        <div class="conclusion-title">${diferencia !== 0 ? 'Ajuste registrado correctamente' : 'Conteo registrado — sin diferencias'}</div>
        <div class="conclusion-detail">
          ${nombre} — conteo: <strong>${conteo}</strong> unidades.<br>
          ${diferencia !== 0 ? `Diferencia: ${diferencia > 0 ? '+' : ''}${diferencia} · Motivo: ${motivo}` : 'El stock coincide con el sistema. ✓'}
        </div>
      </div>
    `;

    // Si es UID con diferencia positiva → generar etiquetas automáticamente
    if(tracking === 'uid' && diferencia > 0 && varianteUIDId){
      await generarEtiquetasDesdeConteo(skuId, nombre, varianteUIDId, diferencia);
    } else {
      setTimeout(() => iniciarConteo(), 800);
    }

  } catch(e){
    alert('Error al guardar: ' + e.message);
  }
}

function calcularConclusionVariantes(skuId, nombre){
  const inputs = document.querySelectorAll('.input-variante');
  let hayDiferencia = false;
  inputs.forEach(inp=>{
    const val = inp.value.trim();
    if(val === '') return;
    const contado = parseInt(val);
    const teorico = parseInt(inp.dataset.teorico)||0;
    const dif = contado - teorico;
    const varId = inp.dataset.varianteId;
    const box = document.getElementById(`concl-var-${varId}`);
    if(!box) return;
    if(dif === 0){
      box.innerHTML = `<span style="font-size:11px;color:var(--green);">✓ Coincide</span>`;
    } else {
      hayDiferencia = true;
      box.innerHTML = `<span style="font-size:11px;color:${dif>0?'var(--amber)':'var(--red)'};">${dif>0?'+':''}${dif} diferencia</span>`;
    }
  });
  // Mostrar sección de confirmar si al menos un input tiene valor
  const alguno = [...inputs].some(i=>i.value.trim()!=='');
  const ajusteSection = document.getElementById('ajuste-section');
  if(alguno && ajusteSection) ajusteSection.style.display='block';
  const motivoWrap = document.getElementById('motivo-wrap');
  if(motivoWrap) motivoWrap.style.display = hayDiferencia ? 'block' : 'none';
  const btn = document.getElementById('btn-confirmar-ajuste');
  if(btn) btn.textContent = hayDiferencia ? '✓ Confirmar ajuste' : '✓ Registrar conteo sin novedad';
}

async function confirmarAjusteVariantes(skuId, nombre){
  const inputs = document.querySelectorAll('.input-variante');
  const motivo = document.getElementById('input-motivo')?.value.trim()||'';
  const hayDiferencia = [...inputs].some(i=>{
    const v=i.value.trim(); if(!v) return false;
    return parseInt(v) !== parseInt(i.dataset.teorico||'0');
  });
  if(hayDiferencia && !motivo){ alert('Ingresá un motivo para el ajuste.'); return; }
  const usuario = localStorage.getItem('tn_usuario')||'Gerencia';
  try {
    for(const inp of inputs){
      const val = inp.value.trim();
      if(val === '') continue;
      const contado = parseInt(val);
      const teorico = parseInt(inp.dataset.teorico)||0;
      const dif = contado - teorico;
      const varianteId = inp.dataset.varianteId;
      const varianteNombre = inp.dataset.varianteNombre;
      const stockId = inp.dataset.stockId;
      // Registrar conteo
      await api('stock_conteos', 'POST', {
        sku_id: skuId, cantidad_teorica: teorico, cantidad_contada: contado,
        diferencia: dif, hubo_ajuste: dif!==0, usuario,
        notas: dif!==0 ? `Conteo físico ${varianteNombre} — ${motivo}` : `Conteo sin novedad (${varianteNombre})`
      });
      if(dif !== 0){
        await api('stock_ajustes', 'POST', {
          sku_id: skuId,
          cantidad_contada: contado,
          cantidad_anterior: teorico,
          diferencia: dif,
          motivo: `Conteo físico ${varianteNombre} — ${motivo}`,
          usuario: usuario
        });
        // Actualizar stock de esa variante
        if(stockId){
          await api(`stock?id=eq.${stockId}`, 'PATCH', { cantidad: contado });
        }
      }
    }
    // Actualizar semáforo
    _ultimosConteos[skuId] = { sku_id: skuId, fecha: new Date().toISOString(), diferencia: hayDiferencia?1:0 };
    renderSemaforo();
    document.getElementById('ajuste-section').style.display='none';
    document.getElementById('conclusion-box').innerHTML = `
      <div class="conclusion ok">
        <div class="conclusion-icon">✅</div>
        <div class="conclusion-title">${hayDiferencia?'Ajuste registrado':'Conteo registrado sin diferencias'}</div>
        <div class="conclusion-detail">${nombre} — conteo por variante completado.</div>
      </div>`;
    inputs.forEach(i=>i.value='');
    // Recargar historial
    setTimeout(() => iniciarConteo(), 800);
  } catch(e){ alert('Error: '+e.message); }
}

function cancelarAjuste(){
  document.getElementById('input-motivo').value = '';
  document.getElementById('ajuste-section').style.display = 'none';
  limpiarConclusion();
  document.getElementById('input-conteo').value = '';
}

// ─── Generar etiquetas desde conteo físico ────────────────────────────────────
function generarPrefijo(codigo, variante){
  const varMap = {'Negro':'NEG','Blanco':'BLA','Gris Plomo':'GRP','Gris Claro':'GRC',
    'Azul':'AZU','Rojo':'ROJ','Verde':'VER','A definir':'DEF',
    'XPrinter':'XPR','3 N Star':'NST','Nitcom':'NIT','Vyse':'VYS',
    'Garnic':'GAR','Philips':'PHI','Roku':'ROK'};
  let pref = codigo;
  if(variante){
    const varCod = varMap[variante] || variante.substring(0,3).toUpperCase();
    pref = pref + '-' + varCod;
  }
  return pref;
}

async function generarEtiquetasDesdeConteo(skuId, nombre, varianteId, cantidad){
  try {
    // Obtener codigo del SKU y nombre de variante
    const skuData = await api(`skus?id=eq.${skuId}&select=codigo,nombre`);
    const codigo  = skuData?.[0]?.codigo || String(skuId);
    const varData = await api(`variantes?id=eq.${varianteId}&select=valor`);
    const varNom  = varData?.[0]?.valor || null;

    const prefijo = generarPrefijo(codigo, varNom);

    // Buscar último número para este prefijo
    let lastNum = 0;
    const existing = await api(`unidades?uid=like.${encodeURIComponent(prefijo+'%')}&select=uid`).catch(()=>[]);
    (existing||[]).forEach(u => {
      const m = u.uid.match(/-(\d+)$/);
      if(m){ const n = parseInt(m[1], 10); if(n > lastNum) lastNum = n; }
    });

    const unidades = [], etiquetas = [];
    for(let i = 1; i <= cantidad; i++){
      const uid = `${prefijo}-${String(lastNum+i).padStart(4,'0')}`;
      unidades.push({ uid, sku_id: skuId, variante_id: varianteId||null, estado: 'stock' });
      etiquetas.push({ uid, nombre, variante: varNom, num: lastNum + i });
    }

    await api('unidades', 'POST', unidades);

    // Abrir modal de etiquetas
    if(typeof abrirModalEtiquetas === 'function'){
      abrirModalEtiquetas(etiquetas, null);
    }
  } catch(e){
    alert('Error generando etiquetas: ' + e.message);
  }
}
